<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নাগরিক নিবন্ধন ফরম - কাউন্দিয়া ইউনিয়ন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4 sm:px-6 lg:px-8">

    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <!-- হেডার -->
        <div class="bg-slate-800 text-white p-6 text-center space-y-2">
            <div class="text-3xl text-emerald-400"><i class="fas fa-landmark"></i></div>
            <h2 class="text-xl sm:text-2xl font-bold">কাউন্দিয়া ইউনিয়ন ডিজিটাল সিটিজেন পোর্টাল</h2>
            <p class="text-xs text-slate-300">সঠিক তথ্য দিয়ে ডিজিটাল ডাটাবেজ গঠনে সহায়তা করুন</p>
        </div>

        <!-- মূল ফরম -->
        <form id="citizenRegForm" onsubmit="handleFormSubmit(event)" class="p-6 sm:p-8 space-y-5">
            
            <!-- আবেদন বা নিবন্ধনের ধরন -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">আবেদনের ধরন সিলেক্ট করুন <span class="text-rose-500">*</span></label>
                <select id="applicationType" onchange="toggleApplicationFields()" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm font-semibold text-gray-700">
                    <option value="khana">🏠 নতুন পরিবার প্রধান নিবন্ধন</option>
                    <option value="member">👨‍👩‍👦 বিদ্যমান পরিবারের নতুন সদস্য যোগ করুন</option>
                    <option value="birth">👶 নতুন জন্মগ্রহণকারী শিশু নিবন্ধন</option>
                    <option value="death">🕊️ পরিবারের কোনো সদস্যের মৃত্যু হালনাগাদ</option>
                    <option value="migration">🚛 স্থায়ীভাবে ইউনিয়ন ত্যাগের আবেদন</option>
                </select>
            </div>

            <!-- সেকশন এ: বিদ্যমান পরিবার/শিশুর জন্য পরিবার প্রধানের তথ্য -->
            <div id="familyHeadSection" class="hidden p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100 space-y-4">
                <p class="text-xs font-bold text-indigo-700 flex items-center"><i class="fas fa-link mr-1"></i> লিংক ডাটা: পরিবার প্রধানের তথ্য দিন (মা প্রধান হতে পারেন)</p>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">পরিবার প্রধানের নাম <span class="text-indigo-600">*</span></label>
                        <input type="text" id="familyHeadName" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">পরিবার প্রধানের ফোন নম্বর <span class="text-indigo-600">*</span></label>
                        <input type="text" id="familyHeadPhone" placeholder="যেমন: ০১৭XXXXXXXX" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    </div>
                </div>
            </div>

            <!-- সেকশন বি: মৃত্যু নিবন্ধনের জন্য তথ্যদাতার বিশেষ ফিল্ড -->
            <div id="informantSection" class="hidden p-4 bg-amber-50/50 rounded-2xl border border-amber-100 space-y-4">
                <p class="text-xs font-bold text-amber-800 flex items-center"><i class="fas fa-user-shield mr-1"></i> তথ্য প্রদানকারীর বিবরণ (যিনি মৃত্যুর তথ্য দিচ্ছেন)</p>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">তথ্যদাতার নাম <span class="text-amber-600">*</span></label>
                        <input type="text" id="informantName" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">তথ্যদাতার মোবাইল নম্বর <span class="text-amber-600">*</span></label>
                        <input type="text" id="informantPhone" placeholder="মোবাইল নম্বর" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">মৃত ব্যক্তির সাথে সম্পর্ক <span class="text-amber-600">*</span></label>
                        <select id="informantRelation" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-white">
                            <option value="সন্তান">সন্তান</option>
                            <option value="স্বামী/স্ত্রী">স্বামী/স্ত্রী</option>
                            <option value="ভাই/বোন">ভাই/বোন</option>
                            <option value="পিতা/মাতা">পিতা/মাতা</option>
                            <option value="অন্যান্য">অন্যান্য</option>
                        </select>
                    </div>
                </div>
            </div>

            <hr class="border-gray-100">

            <!-- সাধারণ বা মূল নাগরিক তথ্য সেকশন -->
            <div class="space-y-4">
                <p id="sectionTitle" class="text-xs font-bold text-emerald-700 flex items-center"><i class="fas fa-user mr-1"></i> নাগরিকের ব্যক্তিগত তথ্যাদি</p>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- নাম (ডাইনামিক লেবেল) -->
                    <div>
                        <label id="nameLabel" class="block text-sm font-bold text-gray-700 mb-1">নাগরিকের পূর্ণ নাম <span class="text-rose-500">*</span></label>
                        <input type="text" id="citizenName" required placeholder="নাম লিখুন" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    </div>
                    <!-- পিতা বা আসল অভিভাবকের নাম -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">পিতা বা আসল অভিভাবকের নাম <span class="text-rose-500">*</span></label>
                        <input type="text" id="citizenFatherName" required placeholder="পিতার নাম লিখুন (মা প্রধান হলেও এখানে আসল বাবার নাম দিন)" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    </div>
                </div>

                <!-- তারিখ ও বয়স সেকশন -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <!-- জন্ম তারিখ ক্যালেন্ডার -->
                    <div id="dobField">
                        <label class="block text-sm font-bold text-gray-700 mb-1">জন্ম তারিখ <span class="text-rose-500">*</span></label>
                        <input type="date" id="citizenDob" onchange="calculateAgeFromDates()" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    </div>
                    <!-- মৃত্যু তারিখ ক্যালেন্ডার (শুধুমাত্র মৃত্যু নিবন্ধনে দেখাবে) -->
                    <div id="dodField" class="hidden">
                        <label class="block text-sm font-bold text-gray-700 mb-1">মৃত্যুর তারিখ <span class="text-rose-500">*</span></label>
                        <input type="date" id="citizenDod" onchange="calculateAgeFromDates()" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    </div>
                    <!-- বয়স (স্বয়ংক্রিয় বা ম্যানুয়াল ইনপুট) -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">বয়স (বছর) <span class="text-rose-500">*</span></label>
                        <input type="number" id="citizenAge" required min="0" max="120" placeholder="বছর" oninput="toggleDynamicSpecs()" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    </div>
                    <!-- লিঙ্গ -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">লিঙ্গ <span class="text-rose-500">*</span></label>
                        <select id="citizenGender" onchange="toggleDynamicSpecs()" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm text-gray-700">
                            <option value="पुरुष">পুরুষ</option>
                            <option value="নারী">নারী</option>
                            <option value="অন্যান্য">অন্যান্য</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- মোবাইল নম্বর -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">মোবাইল নম্বর <span class="text-rose-500">*</span></label>
                        <input type="text" id="citizenPhone" required placeholder="১১ ডিজিটের মোবাইল নম্বর" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    </div>
                    <!-- NID বা জন্ম নিবন্ধন -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">NID অথবা জন্ম নিবন্ধন নম্বর</label>
                        <input type="text" id="citizenNidBrn" oninput="toggleDynamicSpecs()" placeholder="NID বা জন্ম নিবন্ধন থাকলে লিখুন" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!--ওয়ার্ড নম্বর -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">ওয়ার্ড নম্বর <span class="text-rose-500">*</span></label>
                        <select id="citizenWard" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm text-gray-700 font-bold">
                            <option value="১">১ নং ওয়ার্ড</option>
                            <option value="২">২ নং ওয়ার্ড</option>
                            <option value="৩">৩ নং ওয়ার্ড</option>
                            <option value="৪">৪ নং ওয়ার্ড</option>
                            <option value="৫">৫ নং ওয়ার্ড</option>
                            <option value="৬">৬ নং ওয়ার্ড</option>
                            <option value="৭">৭ নং ওয়ার্ড</option>
                            <option value="৮">৮ নং ওয়ার্ড</option>
                            <option value="৯">৯ নং ওয়ার্ড</option>
                        </select>
                    </div>
                    <!-- গ্রাম/মহল্লা -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">গ্রাম / পাড়া / মহল্লা <span class="text-rose-500">*</span></label>
                        <input type="text" id="citizenVillage" required placeholder="যেমন: পশ্চিম কাউন্দিয়া" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    </div>
                </div>

                <!-- ================= ডাইনামিক স্পেশাল কন্ডিশন সেকশন (রিয়েল-টাইম ইন্টেলিজেন্ট ট্রিগার) ================= -->
                <div id="specialInfoSection" class="space-y-3 p-4 bg-gray-50 rounded-2xl border border-gray-200 hidden">
                    <p class="text-xs font-bold text-slate-700 flex items-center"><i class="fas fa-heartbeat mr-1 text-rose-500"></i> বয়স ও বিশেষ তথ্য (পরিসংখ্যানের জন্য)</p>
                    
                    <!-- গর্ভবতী মায়ের ফিল্ড -->
                    <div id="pregnantMotherField" class="hidden items-center gap-2 p-2.5 bg-rose-50 rounded-xl text-sm text-rose-800">
                        <input type="checkbox" id="isPregnant" class="w-4 h-4 accent-rose-600">
                        <label for="isPregnant" class="font-bold cursor-pointer">আপনি কি একজন গর্ভবতী/প্রসূতি মা? (টিক দিন)</label>
                    </div>

                    <!-- শিক্ষা স্থিতি ফিল্ড (৫-১৮ বছর) -->
                    <div id="studentStatusField" class="hidden space-y-1 text-sm">
                        <label class="block font-bold text-gray-700">শিশু/কিশোরটি কি বর্তমানে শিক্ষা প্রতিষ্ঠানে অধ্যয়নরত আছে? <span class="text-rose-500">*</span></label>
                        <select id="isStudent" class="w-full px-3 py-2 border border-gray-200 rounded-xl bg-white text-sm">
                            <option value="yes">হ্যাঁ, নিয়মিত পড়াশোনা করছে 📚</option>
                            <option value="no">না, বর্তমানে স্কুলে যাচ্ছে না (ঝরে পড়া/অন্যান্য) ⚠️</option>
                            <option value="not_applicable">প্রযোজ্য নয় (বয়স অনুপযোগী)</option>
                        </select>
                    </div>

                    <!-- ১৮+ নতুন ভোটার হওয়ার আগ্রহের ড্রপডাউন (আপনার স্পেশাল রিকুয়েস্ট করা ফিচার) -->
                    <div id="newVoterField" class="hidden space-y-1 text-sm">
                        <label class="block font-bold text-indigo-800">⚠️ আপনার বয়স ১৮+ কিন্তু ডাটাতে কোনো NID বা ভোটার রেকর্ড পাওয়া যায়নি। আপনি কি নতুন ভোটার তালিকায় অন্তর্ভুক্ত হতে চান? <span class="text-rose-500">*</span></label>
                        <select id="wantsToBeVoter" class="w-full px-3 py-2 border border-indigo-200 rounded-xl bg-indigo-50 text-sm font-semibold text-indigo-900">
                            <option value="no">না, আমার ইতিমধ্যেই এনআইডি/ভোটার কার্ড আছে</option>
                            <option value="yes">🙋‍♂️ হ্যাঁ, আমি নতুন ভোটার হতে আগ্রহী (তালিকায় নাম তুলুন)</option>
                        </select>
                    </div>

                    <!-- পরিবার প্রধান চেক বক্স -->
                    <div id="isFamilyHeadField" class="flex items-center gap-2 p-2 bg-white rounded-xl border border-gray-100">
                        <input type="checkbox" id="isFamilyHead" class="w-4 h-4 accent-emerald-600">
                        <label for="isFamilyHead" class="font-semibold text-gray-700 text-sm cursor-pointer">আপনি কি আপনার পরিবারের প্রধান (Family Head)? (টিক দিন)</label>
                    </div>
                </div>
                <!-- ======================================================================================== -->

                <!-- ডাইনামিক সেকশন: পরিবার প্রধানের সাথে সম্পর্ক -->
                <div id="relationSection" class="hidden">
                    <label class="block text-sm font-bold text-gray-700 mb-1">পরিবার প্রধানের সাথে সম্পর্ক <span class="text-rose-500">*</span></label>
                    <select id="familyRelation" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm text-gray-700">
                        <option value="স্ত্রী">স্ত্রী</option>
                        <option value="ছেলে">ছেলে</option>
                        <option value="মেয়ে">মেয়ে</option>
                        <option value="ভাই">ভাই</option>
                        <option value="বোন">বোন</option>
                        <option value="মা">মা</option>
                        <option value="বাবা">বাবা</option>
                        <option value="অন্যান্য">অন্যান্য</option>
                    </select>
                </div>

                <!-- পেশা ও মালিকানা সেকশন (মৃত্যু, মাইগ্রেশন ও সদ্যোজাতদের জন্য হাইড হবে) -->
                <div id="professionAndPropertySection" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">প্রধান পেশা <span class="text-rose-500">*</span></label>
                        <select id="citizenProfession" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm text-gray-700">
                            <option value="ব্যবসায়ী">ব্যবসায়ী</option>
                            <option value="কৃষক">কৃষক</option>
                            <option value="নৌকা চালক">নৌকা চালক 🚣</option>
                            <option value="অটো চালক">অটো চালক 🛺</option>
                            <option value="শিক্ষক">শিক্ষক 👨‍🏫</option>
                            <option value="ডাক্তার">ডাক্তার 🩺</option>
                            <option value="চাকুরীজীবী">চাকুরীজীবী</option>
                            <option value="গৃহিণী">গৃহিণী</option>
                            <option value="ছাত্র/ছাত্রী">ছাত্র/ছাত্রী</option>
                            <option value="প্রবাসী">প্রবাসী</option>
                            <option value="দিনমজুর">দিনমজুর</option>
                            <option value="কোনোটিই নয়">কোনোটিই নয় (অন্যান্য)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">বাসস্থানের মালিকানার অবস্থা <span class="text-rose-500">*</span></label>
                        <select id="homeStatus" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm text-gray-700">
                            <option value="মালিক">🏠 নিজস্ব বাড়ি (মালিক)</option>
                            <option value="ভাড়াটিয়ার">🏢 ভাড়াটিয়া</option>
                        </select>
                    </div>
                </div>

            </div>

            <!-- সাবমিট বাটন -->
            <div class="pt-4">
                <button type="submit" class="w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold shadow-md transition duration-200 flex items-center justify-center gap-2 text-base">
                    <i class="fas fa-paper-plane"></i>
                    <span id="submitBtnText">নিবন্ধনের জন্য আবেদন জমা দিন</span>
                </button>
            </div>
        </form>
    </div>

    <!-- গোপন আইডি হোল্ডার: এই কন্টেইনারটি hidden থাকায় নিচে কোনো অহেতুক ফাঁকা জায়গা গ্রাস করবে না -->
    <div id="hiddenIdContainer" class="hidden"></div>

    <script>
        // ১. ডাইনামিক ফিল্ড ও লেবেল কন্ট্রোলার ইঞ্জিন
        function toggleApplicationFields() {
            let type = document.getElementById('applicationType').value;
            
            let familyHeadSection = document.getElementById('familyHeadSection');
            let informantSection = document.getElementById('informantSection');
            let relationSection = document.getElementById('relationSection');
            let profPropSection = document.getElementById('professionAndPropertySection');
            
            let dobField = document.getElementById('dobField');
            let dodField = document.getElementById('dodField');
            let isFamilyHeadField = document.getElementById('isFamilyHeadField');
            
            let nameLabel = document.getElementById('nameLabel');
            let sectionTitle = document.getElementById('sectionTitle');
            let submitBtnText = document.getElementById('submitBtnText');
            let ageInput = document.getElementById('citizenAge');

            // ডিফল্ট রিসেট কন্ডিশন
            familyHeadSection.classList.add('hidden');
            informantSection.classList.add('hidden');
            relationSection.classList.add('hidden');
            profPropSection.classList.remove('hidden');
            dodField.classList.add('hidden');
            isFamilyHeadField.classList.remove('hidden');
            ageInput.readOnly = false;
            
            nameLabel.innerHTML = 'নাগরিকের পূর্ণ নাম <span class="text-rose-500">*</span>';
            sectionTitle.innerHTML = '<i class="fas fa-user mr-1"></i> নাগরিকের ব্যক্তিগত তথ্যাদি';
            submitBtnText.innerText = 'নিবন্ধনের জন্য আবেদন জমা দিন';

            if (type === 'member') {
                familyHeadSection.classList.remove('hidden');
                relationSection.classList.remove('hidden');
            } 
            else if (type === 'birth') {
                familyHeadSection.classList.remove('hidden');
                profPropSection.classList.add('hidden'); 
                isFamilyHeadField.classList.add('hidden'); 
                nameLabel.innerHTML = 'আপনার শিশু/বাচ্চার নাম দিন <span class="text-rose-500">*</span>';
                ageInput.readOnly = true;
            } 
            else if (type === 'death') {
                informantSection.classList.remove('hidden'); 
                profPropSection.classList.add('hidden'); 
                dodField.classList.remove('hidden'); 
                isFamilyHeadField.classList.add('hidden');
                ageInput.readOnly = true;
                
                nameLabel.innerHTML = 'মৃত ব্যক্তির নাম <span class="text-rose-500">*</span>';
                sectionTitle.innerHTML = '<i class="fas fa-monument mr-1 text-amber-600"></i> মৃত ব্যক্তির চিরস্থায়ী রেকর্ড ফর্ম';
                submitBtnText.innerText = 'মৃত্যু রেকর্ড হালনাগাদ করুন';
            }
            // স্থানান্তরিত পরিবারের কন্ডিশন
            else if (type === 'migration') {
                profPropSection.classList.add('hidden');
                isFamilyHeadField.classList.add('hidden');
                nameLabel.innerHTML = 'স্থানান্তরিত খানা প্রধান/সদস্যের নাম <span class="text-rose-500">*</span>';
                sectionTitle.innerHTML = '<i class="fas fa-shipping-fast mr-1 text-indigo-600"></i> স্থায়ীভাবে ইউনিয়ন ত্যাগের নোটিশ ফর্ম';
                submitBtnText.innerText = 'স্থানান্তর রেকর্ড আপডেট করুন';
            }

            toggleDynamicSpecs();
        }

        // ২. জন্ম ও মৃত্যু তারিখ দিয়ে অটোমেটিক নিখুঁত বয়স হিসাব ইঞ্জিন
        function calculateAgeFromDates() {
            let type = document.getElementById('applicationType').value;
            let dobValue = document.getElementById('citizenDob').value;
            let ageInput = document.getElementById('citizenAge');

            if (!dobValue) return;

            let birthDate = new Date(dobValue);
            let endDate = new Date(); // আজ

            if (type === 'death') {
                let dodValue = document.getElementById('citizenDod').value;
                if (dodValue) endDate = new Date(dodValue);
            }

            let age = endDate.getFullYear() - birthDate.getFullYear();
            let m = endDate.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && endDate.getDate() < birthDate.getDate())) {
                age--;
            }

            ageInput.value = age >= 0 ? age : 0;
            toggleDynamicSpecs();
        }

        // ৩. বয়স, লিঙ্গ ও এনআইডি ট্র্রিগার ফিল্টারিং (ভোটার, গর্ভবতী মা ও শিশু প্রটেকশন)
        function toggleDynamicSpecs() {
            let age = parseInt(document.getElementById('citizenAge').value) || 0;
            let gender = document.getElementById('citizenGender').value;
            let nidBrnValue = document.getElementById('citizenNidBrn').value.trim();
            let type = document.getElementById('applicationType').value;

            let specSection = document.getElementById('specialInfoSection');
            let pregField = document.getElementById('pregnantMotherField');
            let studentField = document.getElementById('studentStatusField');
            let newVoterField = document.getElementById('newVoterField');

            // মৃত্যু ও স্থানান্তরের জন্য বিশেষ ধূসর বক্স প্রযোজ্য নয়
            if (type === 'death' || type === 'migration') {
                specSection.classList.add('hidden');
                return;
            }

            let showSection = false;

            // ক) গর্ভবতী মা ফিল্ড (বয়স ৫ এর নিচে হলে প্রটেক্টেড)
            if (gender === 'নারী' && age >= 12 && age <= 50 && type !== 'birth') {
                pregField.classList.remove('hidden');
                pregField.classList.add('flex');
                showSection = true;
            } else {
                pregField.classList.add('hidden');
                pregField.classList.remove('flex');
                document.getElementById('isPregnant').checked = false;
            }

            // খ) শিক্ষা স্থিতি (৫-১৮ বছর)
            if (age >= 5 && age <= 18 && type !== 'birth') {
                studentField.classList.remove('hidden');
                showSection = true;
            } else {
                studentField.classList.add('hidden');
                document.getElementById('isStudent').value = 'not_applicable';
            }

            // গ) ১৮+ সম্ভাব্য নতুন ভোটার লজিক (আপনার স্পেশাল রিকুয়েস্ট)
            if (age >= 18 && nidBrnValue.length === 0) {
                newVoterField.classList.remove('hidden');
                showSection = true;
            } else {
                newVoterField.classList.add('hidden');
                document.getElementById('wantsToBeVoter').value = 'no';
            }

            // সেকশন ডিসপ্লে লজিক
            if (showSection || type === 'birth' || age > 0) {
                specSection.classList.remove('hidden');
            } else {
                specSection.classList.add('hidden');
            }
        }

        // ৪. তথ্য জমাদান ও ডাটাবেজ প্রсеসিং
        function handleFormSubmit(event) {
            event.preventDefault();

            let appType = document.getElementById('applicationType').value;
            let name = document.getElementById('citizenName').value.trim();
            let fatherName = document.getElementById('citizenFatherName').value.trim();
            let phone = document.getElementById('citizenPhone').value.trim();
            let nid_brn = document.getElementById('citizenNidBrn').value.trim();
            let age = parseInt(document.getElementById('citizenAge').value) || 0;
            let gender = document.getElementById('citizenGender').value;
            let ward = document.getElementById('citizenWard').value;
            let village = document.getElementById('citizenVillage').value.trim();

            let verifiedCitizens = JSON.parse(localStorage.getItem('unionCitizens')) || [];
            let pendingRegistrations = JSON.parse(localStorage.getItem('pendingRegistrations')) || [];

            // মোবাইল ডুপ্লিকেট পলিসি ফিল্টার
            if (appType === 'khana') {
                let isDuplicate = verifiedCitizens.some(c => c.phone === phone && c.isAlive === true) || 
                                  pendingRegistrations.some(c => c.phone === phone);
                if (isDuplicate) {
                    alert("⚠️ এই মোবাইল নম্বরটি অলরেডি ডাটাবেজে খানা প্রধান হিসেবে নিবন্ধিত আছে!");
                    return;
                }
            }

            // সিক্রেট ব্যাকগ্রাউন্ড আইডি জেনারেশন (স্পেস খাবে না)
            let autoGenId = 'CZ-' + Date.now();
            document.getElementById('hiddenIdContainer').innerText = autoGenId;

            let citizenData = {
                id: autoGenId,
                applicationType: appType,
                name: name,
                fatherName: fatherName,
                phone: phone,
                nid: nid_brn || null,
                age: age,
                gender: gender,
                ward: ward,
                village: village,
                isPregnant: document.getElementById('isPregnant').checked,
                isStudent: document.getElementById('isStudent').value,
                wantsToBeVoter: document.getElementById('wantsToBeVoter').value === 'yes' ? true : false,
                isFamilyHead: document.getElementById('isFamilyHead').checked,
                isAlive: true, // ডিফল্ট জীবিত ও সক্রিয়
                profession: (appType === 'birth') ? 'কোনোটিই নয়' : document.getElementById('citizenProfession').value,
                homeStatus: (appType === 'birth') ? 'মালিক' : document.getElementById('homeStatus').value
            };

            // খানা লিঙ্কিং
            if (appType === 'member' || appType === 'birth') {
                citizenData.familyHeadName = document.getElementById('familyHeadName').value.trim();
                citizenData.familyMobile = document.getElementById('familyHeadPhone').value.trim();
                citizenData.relationWithHead = appType === 'birth' ? 'সন্তান' : document.getElementById('familyRelation').value;
            }

            // মৃত্যু প্রসেসিং
            if (appType === 'death') {
                citizenData.isAlive = false; // ডেটাবেজ স্ট্যাটাস: মৃত
                citizenData.deathDate = document.getElementById('citizenDod').value;
                citizenData.informantName = document.getElementById('informantName').value.trim();
                citizenData.informantPhone = document.getElementById('informantPhone').value.trim();
                citizenData.informantRelation = document.getElementById('informantRelation').value;
                
                let existingIndex = verifiedCitizens.findIndex(c => (c.name === name && c.phone === phone) || (nid_brn && c.nid === nid_brn));
                if (existingIndex !== -1) {
                    verifiedCitizens[existingIndex].isAlive = false;
                    localStorage.setItem('unionCitizens', JSON.stringify(verifiedCitizens));
                    alert("🕊️ ডাটাবেজে উক্ত নাগরিকের ফাইল সফলভাবে 'মৃত' স্ট্যাটাসে আপডেট করা হয়েছে।");
                    document.getElementById('citizenRegForm').reset();
                    toggleApplicationFields();
                    return;
                }
            }

            // স্থানান্তরিত পরিবার প্রসেসিং
            if (appType === 'migration') {
                citizenData.isAlive = 'migrated'; // ডেটাবেজ স্ট্যাটাস: স্থানান্তরিত
                
                let existingIndex = verifiedCitizens.findIndex(c => (c.name === name && c.phone === phone) || (nid_brn && c.nid === nid_brn));
                if (existingIndex !== -1) {
                    verifiedCitizens[existingIndex].isAlive = 'migrated';
                    localStorage.setItem('unionCitizens', JSON.stringify(verifiedCitizens));
                    alert("🚛 উক্ত নাগরিক/খানার ফাইল সফলভাবে 'স্থানান্তরিত' হিসেবে আপডেট করা হয়েছে।");
                    document.getElementById('citizenRegForm').reset();
                    toggleApplicationFields();
                    return;
                }
            }

            pendingRegistrations.push(citizenData);
            localStorage.setItem('pendingRegistrations', JSON.stringify(pendingRegistrations));

            alert("🎉 আবেদনটি সফলভাবে অপেক্ষমাণ তালিকায় জমা হয়েছে!");
            document.getElementById('citizenRegForm').reset();
            toggleApplicationFields();
        }
    </script>
</body>
</html>
