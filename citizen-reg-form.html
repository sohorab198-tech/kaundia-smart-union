<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নাগরিক নিবন্ধন ফরম - কাউন্দিয়া ইউনিয়ন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4 sm:px-6 lg:px-8">

    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-slate-800 text-white p-6 text-center space-y-2">
            <div class="text-3xl text-emerald-400"><i class="fas fa-home"></i></div>
            <h2 class="text-xl sm:text-2xl font-bold">কাউন্দিয়া ইউনিয়ন ডিজিটাল协同 সিটিজেন পোর্টাল</h2>
            <p class="text-xs text-slate-300">সঠিক তথ্য দিয়ে ডিজিটাল ডাটাবেজ গঠনে সহায়তা করুন</p>
        </div>

        <form id="citizenRegForm" onsubmit="handleFormSubmit(event)" class="p-6 sm:p-8 space-y-5">
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">আবেদনের ধরন সিলেক্ট করুন <span class="text-rose-500">*</span></label>
                <select id="applicationType" onchange="toggleApplicationFields()" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm font-semibold text-gray-700">
                    <option value="khana">🏠 নতুন পরিবার খানা প্রধান নিবন্ধন</option>
                    <option value="member">👨‍👩‍👦 বিদ্যমান পরিবারের নতুন সদস্য যোগ করুন</option>
                    <option value="birth">👶 নতুন জন্মগ্রহণকারী শিশু (০-৫ বছর) নিবন্ধন</option>
                    <option value="death">🕊️ পরিবারের কোনো সদস্যের মৃত্যু হালনাগাদ</option>
                    <option value="migration">🚛 স্থায়ীভাবে ইউনিয়ন த্যাগের আবেদন</option>
                </select>
            </div>

            <div id="familyHeadSection" class="hidden p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100 space-y-4">
                <p class="text-xs font-bold text-indigo-700 flex items-center"><i class="fas fa-link mr-1"></i> লিঙ্কিং ডাটা: প্রথমে পরিবার প্রধানের তথ্য দিন</p>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">পরিবার প্রধানের নাম <span class="text-indigo-600">*</span></label>
                        <input type="text" id="familyHeadName" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">পরিবার প্রধানের ফোন নম্বর <span class="text-indigo-600">*</span></label>
                        <input type="text" id="familyHeadPhone" placeholder="যেমন: ০১৭XXXXXXXX" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    </div>
                </div>
            </div>

            <hr class="border-gray-100">

            <div class="space-y-4">
                <p class="text-xs font-bold text-emerald-700 flex items-center"><i class="fas fa-user mr-1"></i> নাগরিকের ব্যক্তিগত তথ্যাদি</p>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">নাগরিকের পূর্ণ নাম <span class="text-rose-500">*</span></label>
                        <input type="text" id="citizenName" required placeholder="বাংলা বা ইংরেজিতে লিখুন" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">পিতা বা অভিভাবকের নাম <span class="text-rose-500">*</span></label>
                        <input type="text" id="citizenFatherName" required placeholder="পিতার নাম লিখুন" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">মোবাইল নম্বর <span class="text-rose-500">*</span></label>
                        <input type="text" id="citizenPhone" required placeholder="১১ ডিজিটের মোবাইল নম্বর" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">NID অথবা জন্ম নিবন্ধন নম্বর <span class="text-gray-400 text-xs">(ঐচ্ছিক)</span></label>
                        <input type="text" id="citizenNidBrn" placeholder="যদি থাকে তবে লিখুন" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">বয়স <span class="text-rose-500">*</span></label>
                        <input type="number" id="citizenAge" oninput="toggleDynamicSpecs()" required min="0" max="120" placeholder="বছর" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">লিঙ্গ <span class="text-rose-500">*</span></label>
                        <select id="citizenGender" onchange="toggleDynamicSpecs()" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm text-gray-700">
                            <option value="পুরুষ">পুরুষ</option>
                            <option value="নারী">নারী</option>
                            <option value="অন্যান্য">অন্যান্য</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">ওয়ার্ড নম্বর <span class="text-rose-500">*</span></label>
                        <select id="citizenWard" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm text-gray-700 font-bold">
                            <option value="১">১ নং ওয়ার্ড</option>
                            <option value="২">২ নং ওয়ার্ড</option>
                            <option value="৩">৩ নং ওয়ার্ড</option>
                            <option value="৪">৪ নং ওয়ার্ড</option>
                            <option value="৫">৫ নং ওয়ার্ড</option>
                            <option value="৬">৬ নং ওয়ার্ড</option>
                            <option value="৭">৭ নং ওয়ার্ড</option>
                            <option value="৮">৮ নং ওয়ার্ড</option>
                            <option value="৯">৯ নং ওয়ার্ড</option>
                        </select>
                    </div>
                </div>

                <div id="specialInfoSection" class="space-y-3 p-4 bg-gray-50 rounded-2xl border border-gray-200 hidden">
                    <p class="text-xs font-bold text-slate-700 flex items-center"><i class="fas fa-heartbeat mr-1 text-rose-500"></i> বয়স ও বিশেষ তথ্য (পরিসংখ্যানের জন্য)</p>
                    
                    <div id="pregnantMotherField" class="hidden items-center gap-2 p-2.5 bg-rose-50 rounded-xl text-sm text-rose-800">
                        <input type="checkbox" id="isPregnant" class="w-4 h-4 accent-rose-600">
                        <label for="isPregnant" class="font-bold cursor-pointer">আপনি কি একজন গর্ভবতী/প্রসূতি মা? (টিক দিন)</label>
                    </div>

                    <div id="studentStatusField" class="hidden space-y-1 text-sm">
                        <label class="block font-bold text-gray-700">শিশু/কিশোরটি কি বর্তমানে শিক্ষা প্রতিষ্ঠানে অধ্যয়নরত আছে? <span class="text-rose-500">*</span></label>
                        <select id="isStudent" class="w-full px-3 py-2 border border-gray-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                            <option value="yes">হ্যাঁ, নিয়মিত পড়াশোনা করছে 📚</option>
                            <option value="no">না, বর্তমানে স্কুলে যাচ্ছে না (ঝরে পড়া/অন্যান্য) ⚠️</option>
                            <option value="not_applicable">প্রযোজ্য নয় (বয়স অনুপযোগী)</option>
                        </select>
                    </div>

                    <div class="flex items-center gap-2 p-2 bg-white rounded-xl border border-gray-100">
                        <input type="checkbox" id="isFamilyHead" class="w-4 h-4 accent-emerald-600">
                        <label for="isFamilyHead" class="font-semibold text-gray-700 text-xs sm:text-sm cursor-pointer">আপনি কি আপনার পরিবারের প্রধান (Family Head)? (টিক দিন)</label>
                    </div>
                </div>
                <div id="relationSection" class="hidden">
                    <label class="block text-sm font-bold text-gray-700 mb-1">পরিবার প্রধানের সাথে সম্পর্ক <span class="text-rose-500">*</span></label>
                    <select id="familyRelation" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm text-gray-700">
                        <option value="স্ত্রী">স্ত্রী</option>
                        <option value="ছেলে">ছেলে</option>
                        <option value="মেয়ে">মেয়ে</option>
                        <option value="ভাই">ভাই</option>
                        <option value="বোন">বোন</option>
                        <option value="মা">মা</option>
                        <option value="বাবা">বাবা</option>
                        <option value="অন্যান্য">অন্যান্য</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">প্রধান পেশা <span class="text-rose-500">*</span></label>
                        <select id="citizenProfession" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm text-gray-700">
                            <option value="ব্যবসায়ী">ব্যবসায়ী</option>
                            <option value="কৃষক">কৃষক</option>
                            <option value="নৌকা চালক">নৌকা চালক 🚣</option>
                            <option value="অটো চালক">অটো চালক 🛺</option>
                            <option value="শিক্ষক">শিক্ষক 👨‍🏫</option>
                            <option value="ডাক্তার">ডাক্তার 🩺</option>
                            <option value="চাকুরীজীবী">চাকুরীজীবী</option>
                            <option value="গৃহিণী">গৃহিণী</option>
                            <option value="ছাত্র/ছাত্রী">ছাত্র/ছাত্রী</option>
                            <option value="প্রবাসী">প্রবাসী</option>
                            <option value="দিনমজুর">দিনমজুর</option>
                            <option value="কোনোটিই নয়">কোনোটিই নয় (শিশু/অন্যান্য)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">বাসস্থানের মালিকানার অবস্থা <span class="text-rose-500">*</span></label>
                        <select id="homeStatus" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50 text-sm text-gray-700">
                            <option value="মালিক">🏠 নিজস্ব বাড়ি (মালিক)</option>
                            <option value="ভাড়াটিয়ার">🏢 ভাড়াটিয়া</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">গ্রাম / পাড়া / মহল্লা <span class="text-rose-500">*</span></label>
                    <input type="text" id="citizenVillage" required placeholder="যেমন: পশ্চিম কাউন্দিয়া" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold shadow-md transition duration-200 flex items-center justify-center gap-2 text-base">
                    <i class="fas fa-paper-plane"></i>
                    <span>নিবন্ধনের জন্য আবেদন জমা দিন</span>
                </button>
            </div>
        </form>
    </div>

    <script>
        // ১. ডাইনামিক ফিল্ড কন্ট্রোলার (আবেদন টাইপ অনুযায়ী)
        function toggleApplicationFields() {
            let type = document.getElementById('applicationType').value;
            let familyHeadSection = document.getElementById('familyHeadSection');
            let relationSection = document.getElementById('relationSection');
            
            let headName = document.getElementById('familyHeadName');
            let headPhone = document.getElementById('familyHeadPhone');
            let relation = document.getElementById('familyRelation');

            if (type === 'member') {
                familyHeadSection.classList.remove('hidden');
                relationSection.classList.remove('hidden');
                headName.required = true;
                headPhone.required = true;
                relation.required = true;
            } else {
                familyHeadSection.classList.add('hidden');
                relationSection.classList.add('hidden');
                headName.required = false;
                headPhone.required = false;
                relation.required = false;
            }

            if (type === 'birth') {
                document.getElementById('citizenAge').value = '0';
                document.getElementById('citizenProfession').value = 'কোনোটিই নয়';
                toggleDynamicSpecs(); // বয়স আপডেট ট্রিগার
            }
        }

        // ২. বয়স ও লিঙ্গ অনুযায়ী স্পেশাল কন্ডিশন শো/হাইড মেকানিজম (নতুন)
        function toggleDynamicSpecs() {
            let age = parseInt(document.getElementById('citizenAge').value) || 0;
            let gender = document.getElementById('citizenGender').value;
            let specSection = document.getElementById('specialInfoSection');
            let pregField = document.getElementById('pregnantMotherField');
            let studentField = document.getElementById('studentStatusField');

            let showSection = false;

            // গর্ভবতী মায়ের শর্ত: নারী এবং বয়স ১২ থেকে ৫০ এর মধ্যে হলে
            if (gender === 'নারী' && age >= 12 && age <= 50) {
                pregField.classList.remove('hidden');
                pregField.classList.add('flex');
                showSection = true;
            } else {
                pregField.classList.add('hidden');
                pregField.classList.remove('flex');
                document.getElementById('isPregnant').checked = false;
            }

            // শিক্ষা স্থিতি বা স্কুলিং শর্ত: বয়স ৫ থেকে ১৮ এর মধ্যে হলে
            if (age >= 5 && age <= 18) {
                studentField.classList.remove('hidden');
                showSection = true;
            } else {
                studentField.classList.add('hidden');
                document.getElementById('isStudent').value = 'not_applicable';
            }

            // যদি কোনো শর্তই না মিলে তবে পুরো ধূসর বক্সটি হাইড থাকবে
            if (showSection || age > 0) {
                specSection.classList.remove('hidden');
            } else {
                specSection.classList.add('hidden');
            }
        }

        // ৩. ফরম সাবমিশন ইঞ্জিন
        function handleFormSubmit(event) {
            event.preventDefault();

            let appType = document.getElementById('applicationType').value;
            let name = document.getElementById('citizenName').value.trim();
            let fatherName = document.getElementById('citizenFatherName').value.trim();
            let phone = document.getElementById('citizenPhone').value.trim();
            let nid_brn = document.getElementById('citizenNidBrn').value.trim();
            let age = parseInt(document.getElementById('citizenAge').value) || 0;
            let gender = document.getElementById('citizenGender').value;
            let ward = document.getElementById('citizenWard').value;
            let profession = document.getElementById('citizenProfession').value;
            let homeStatus = document.getElementById('homeStatus').value;
            let village = document.getElementById('citizenVillage').value.trim();

            // বিশেষ নতুন ডেটা কালেকশন
            let isPregnant = document.getElementById('isPregnant').checked;
            let isStudent = document.getElementById('isStudent').value;
            let isFamilyHead = document.getElementById('isFamilyHead').checked;

            let verifiedCitizens = JSON.parse(localStorage.getItem('unionCitizens')) || [];
            let pendingCitizens = JSON.parse(localStorage.getItem('pendingRegistrations')) || [];

            // ইউনিক মোবাইল কন্ডিশন ফিল্টার
            if (appType === 'khana') {
                let isPhoneDuplicate = verifiedCitizens.some(c => c.phone === phone) || pendingCitizens.some(c => c.phone === phone);
                if (isPhoneDuplicate) {
                    alert("⚠️ এই মোবাইল নম্বরটি অলরেডি ডাটাবেজে খানা প্রধান হিসেবে নিবন্ধিত আছে!");
                    return;
                }
            }

            // মূল অবজেক্ট তৈরি
            let citizenData = {
                id: 'CZ-' + Date.now(),
                applicationType: appType,
                name: name,
                fatherName: fatherName,
                phone: phone,
                nid: nid_brn || null,
                age: age,
                gender: gender,
                ward: ward,
                profession: profession,
                homeStatus: homeStatus,
                village: village,
                isPregnant: isPregnant,
                isStudent: isStudent,
                isFamilyHead: isFamilyHead,
                isApproved: false
            };

            if (appType === 'member') {
                citizenData.familyHeadName = document.getElementById('familyHeadName').value.trim();
                citizenData.familyMobile = document.getElementById('familyHeadPhone').value.trim();
                citizenData.relationWithHead = document.getElementById('familyRelation').value;
            }

            pendingCitizens.push(citizenData);
            localStorage.setItem('pendingRegistrations', JSON.stringify(pendingCitizens));

            alert("🎉 আপনার নিবন্ধনের আবেদনটি সফলভাবে সাবমিট হয়েছে এবং ইউনিয়ন অ্যাডমিন প্যানেলে অপেক্ষমাণ তালিকায় পাঠানো হয়েছে!");
            document.getElementById('citizenRegForm').reset();
            toggleApplicationFields();
            toggleDynamicSpecs();
        }
    </script>
</body>
</html>
