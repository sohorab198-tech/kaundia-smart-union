<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভর্তির আবেদন তালিকা - আইফ্রেম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
    </style>
</head>
<body class="bg-white p-4 text-slate-800">

    <div class="space-y-6">
        <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-100">
            <div>
                <h3 class="text-lg font-bold text-slate-700 flex items-center gap-2">
                    <i class="fa-solid fa-graduation-cap text-indigo-600"></i> নতুন অনলাইন ভর্তির আবেদনসমূহ
                </h3>
                <p class="text-xs text-slate-500 mt-0.5">আপনার প্রতিষ্ঠানের EIIN কোড অনুযায়ী ফিল্টারকৃত তালিকা</p>
            </div>
            <div class="bg-indigo-600 text-white font-bold text-xs px-4 py-2 rounded-xl shadow-sm">
                মোট আবেদন: <span id="admissionCount">০</span> টি
            </div>
        </div>

        <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100/75 text-slate-600 text-xs font-bold border-b border-slate-200">
                            <th class="p-4 text-center">তারিখ</th>
                            <th class="p-4">শিক্ষার্থীর নাম (বাংলা ও ইংরেজি)</th>
                            <th class="p-4">শ্রেণী/ক্লাস</th>
                            <th class="p-4">জন্ম নিবন্ধন ও জন্ম তারিখ</th>
                            <th class="p-4">অভিভাবক ও ফোন নম্বর</th>
                            <th class="p-4 text-center">স্ট্যাটাস</th>
                            <th class="p-4 text-center">পদক্ষেপ (Action)</th>
                        </tr>
                    </thead>
                    <tbody id="admissionTableBody" class="text-sm divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadInstitutionAdmissions();
        });

       function loadInstitutionAdmissions() {
    // ১. আপনার ড্যাশবোর্ডের বর্তমান সেশন থেকে লগইন করা প্রতিষ্ঠানের আইডি (EIIN) সংগ্রহ
    let sessionDataRaw = localStorage.getItem('user_dashboard_session');
    let currentLoggedInEIIN = "";

    if (sessionDataRaw) {
        let sessionData = JSON.parse(sessionDataRaw);
        // ins-form.html অনুযায়ী প্রতিষ্ঠানের EIIN নম্বরটিই হচ্ছে তার 'id'
        currentLoggedInEIIN = sessionData.id || ""; 
    }

    // টেস্ট করার সুবিধার্থে সেশন না থাকলে একটি ডেমো EIIN (যেমন: 104556) ধরে নেওয়া হবে
    if (!currentLoggedInEIIN) {
        currentLoggedInEIIN = "104556";
    }
    
    // ২. সেন্ট্রাল ডাটাবেজ থেকে সকল আবেদন তুলে আনা
    let totalAdmissions = JSON.parse(localStorage.getItem('centralAdmissions')) || [];
    let tableBody = document.getElementById('admissionTableBody');
    let countSpan = document.getElementById('admissionCount');

    // ৩. সেশনের EIIN কোড দিয়ে আবেদনগুলো ফিল্টার করা
    let myAdmissions = totalAdmissions.filter(adm => adm.institutionId === currentLoggedInEIIN);

    if (countSpan) countSpan.innerText = myAdmissions.length;
    if (!tableBody) return;

    tableBody.innerHTML = '';

    // যদি কোনো আবেদন না থাকে
    if (myAdmissions.length === 0) {
        tableBody.innerHTML = `
            <tr>
                <td colspan="7" class="p-12 text-center text-slate-400 font-semibold">
                    <div class="text-3xl mb-2">📭</div>
                    এখন পর্যন্ত আপনার প্রতিষ্ঠানের জন্য কোনো অনলাইন ভর্তির আবেদন জমা পড়েনি।
                </td>
            </tr>`;
        return;
    }

    // লুপ চালিয়ে টেবিল রো (Row) তৈরি করা
    myAdmissions.forEach(adm => {
        let statusBadge = '';
        if (adm.status === 'অনুমোদিত') {
            statusBadge = '<span class="px-2.5 py-1 bg-emerald-50 text-emerald-600 rounded-lg text-xs font-bold border border-emerald-200">অনুমোদিত</span>';
        } else if (adm.status === 'বাতিল') {
            statusBadge = '<span class="px-2.5 py-1 bg-rose-50 text-rose-600 rounded-lg text-xs font-bold border border-rose-200">বাতিল</span>';
        } else {
            statusBadge = '<span class="px-2.5 py-1 bg-amber-50 text-amber-600 rounded-lg text-xs font-bold border border-amber-200">পেন্ডিং</span>';
        }

        tableBody.innerHTML += `
            <tr class="hover:bg-slate-50/50 transition">
                <td class="p-4 text-center font-semibold text-slate-500">${adm.applyDate || 'N/A'}</td>
                <td class="p-4">
                    <div class="font-bold text-slate-800">${adm.studentNameBn}</div>
                    <div class="text-xs text-slate-400 uppercase font-bold mt-0.5 tracking-wide">${adm.studentNameEn}</div>
                </td>
                <td class="p-4 font-bold text-indigo-600">${adm.studentClass}</td>
                <td class="p-4">
                    <div class="font-semibold text-slate-600 text-xs"><i class="fa-solid fa-id-card text-slate-400"></i> ${adm.birthRegNo}</div>
                    <div class="text-xs text-slate-500 mt-0.5"><i class="fa-solid fa-calendar-days text-slate-400"></i> ${adm.birthDate} (${adm.gender})</div>
                </td>
                <td class="p-4">
                    <div class="font-semibold text-slate-700">${adm.fatherName}</div>
                    <div class="text-xs text-indigo-600 font-bold mt-0.5"><i class="fa-solid fa-phone text-slate-400"></i> ${adm.parentPhone}</div>
                </td>
                <td class="p-4 text-center">${statusBadge}</td>
                <td class="p-4">
                    <div class="flex justify-center gap-2">
                        ${adm.status === 'পেন্ডিং' ? `
                            <button onclick="updateAdmissionStatus('${adm.id}', 'অনুমোদিত')" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-lg shadow-sm transition"><i class="fa-solid fa-check"></i> Approve</button>
                            <button onclick="updateAdmissionStatus('${adm.id}', 'বাতিল')" class="px-3 py-1.5 bg-rose-600 hover:bg-rose-700 text-white text-xs font-bold rounded-lg shadow-sm transition"><i class="fa-solid fa-xmark"></i> Reject</button>
                        ` : `
                            <span class="text-xs text-slate-400 font-bold bg-slate-100 px-2 py-1 rounded"><i class="fa-solid fa-lock"></i> সম্পন্ন</span>
                        `}
                    </div>
                </td>
            </tr>
        `;
    });
}

        // স্ট্যাটাস পরিবর্তন করার মেকানিজম ফাংশন
        function updateAdmissionStatus(admissionId, newStatus) {
            let totalAdmissions = JSON.parse(localStorage.getItem('centralAdmissions')) || [];
            
            totalAdmissions = totalAdmissions.map(adm => {
                if (adm.id === admissionId) {
                    adm.status = newStatus;
                }
                return adm;
            });

            localStorage.setItem('centralAdmissions', JSON.stringify(totalAdmissions));
            alert(`🎉 আবেদনটি সফলভাবে ${newStatus} করা হয়েছে!`);
            loadInstitutionAdmissions(); // টেবিল ইনস্ট্যান্ট রিফ্রেশ করুন
        }
    </script>
</body>
</html>
