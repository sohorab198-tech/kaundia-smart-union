<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পরীক্ষার রেজাল্ট ও মেধা তালিকা জেনারেটর</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark-blue: #0b132b;
            --bg-card: #1c2541;
            --neon-cyan: #00b4d8;
            --text-light: #f8f9fa;
            --text-muted: #6c757d;
            --border-color: #2a3447;
            --danger-red: #e63946;
            --success-green: #2a9d8f;
            --warning-amber: #f4a261;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: transparent; color: var(--text-light); padding: 10px; }
        .panel { background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border-color); padding: 25px; margin-bottom: 25px; }
        h2, h3 { margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; color: var(--neon-cyan); display: flex; align-items: center; gap: 10px; }
        .grid-forms { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; align-items: flex-end; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-weight: 600; font-size: 0.9rem; color: var(--text-light); }
        select, input { padding: 10px; background: var(--bg-dark-blue); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-light); outline: none; font-size: 0.95rem; }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 6px; transition: 0.3s; }
        .btn-primary { background: var(--neon-cyan); color: var(--bg-dark-blue); }
        .btn-success { background: var(--success-green); color: white; }
        .btn-warning { background: var(--warning-amber); color: var(--bg-dark-blue); }
        .btn-danger { background: var(--danger-red); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border-color); }
        th { background: var(--bg-dark-blue); color: var(--neon-cyan); }
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
        .badge-pos { background: rgba(0, 180, 216, 0.2); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); }
    </style>
</head>
<body>

    <div class="panel">
        <h2><i class="fa-solid fa-file-invoice"></i> রেজাল্ট শিট ও নম্বর এন্ট্রি ফর্ম</h2>
        
        <div class="grid-forms" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); margin-bottom: 25px;">
            <div class="form-group">
                <label><i class="fa-solid fa-graduation-cap"></i> শ্রেণি নির্বাচন করুন:</label>
                <select id="resClass" onchange="loadStudentsByClass(this.value)">
                    <option value="Class 6">Class 6</option>
                    <option value="Class 7">Class 7</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-pen-to-square"></i> পরীক্ষার ধরন:</label>
                <select id="resExamType">
                    <option value="অর্ধ-বার্ষিক পরীক্ষা">অর্ধ-বার্ষিক পরীক্ষা</option>
                    <option value="বার্ষিক পরীক্ষা">বার্ষিক পরীক্ষা</option>
                </select>
            </div>
        </div>

        <div class="grid-forms">
            <div class="form-group" style="grid-column: span 2;">
                <label>শিক্ষার্থী নির্বাচন (প্রোফাইল ডাটাবেজ):</label>
                <select id="studentSelect" onchange="autoFillStudentProfile(this.value)">
                    </select>
            </div>
            <div class="form-group">
                <label>রোল নম্বর:</label>
                <input type="text" id="stuRoll" readonly style="background: rgba(255,255,255,0.05); color: var(--warning-amber); font-weight: bold;">
            </div>
            <div class="form-group">
                <label>বাংলা:</label>
                <input type="number" id="marksBan" placeholder="০-১০০" min="0" max="100">
            </div>
            <div class="form-group">
                <label>ইংরেজি:</label>
                <input type="number" id="marksEng" placeholder="০-১০০" min="0" max="100">
            </div>
            <div class="form-group">
                <label>গণিত:</label>
                <input type="number" id="marksMath" placeholder="০-১০০" min="0" max="100">
            </div>
            <div class="form-group">
                <label>বিজ্ঞান:</label>
                <input type="number" id="marksSci" placeholder="০-১০০" min="0" max="100">
            </div>
            <div class="form-group" id="submitBtnContainer">
                <button class="btn btn-primary" onclick="addStudentMark()"><i class="fa-solid fa-plus"></i> নম্বর যুক্ত করুন</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3><i class="fa-solid fa-list-ol"></i> স্বয়ংক্রিয় মেধা তালিকা প্রিভিউ (লাইভ সর্টিং)</h3>
            <button class="btn btn-success" onclick="publishResults()"><i class="fa-solid fa-cloud-arrow-up"></i> চূড়ান্ত মেধা তালিকা পাবলিশ করুন</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>মেধাক্রম (Rank)</th>
                    <th>আইডি (ID)</th>
                    <th>রোল</th>
                    <th style="text-align: left;">শিক্ষার্থীর নাম</th>
                    <th>বাংলা</th>
                    <th>ইংরেজি</th>
                    <th>গণিত</th>
                    <th>বিজ্ঞান</th>
                    <th>মোট নম্বর</th>
                    <th>গড় গ্রেড</th>
                    <th>অ্যাকশন</th>
                </tr>
            </thead>
            <tbody id="previewTableBody">
                <tr id="emptyRow"><td colspan="11" style="color: var(--text-muted);">এখনো কোনো শিক্ষার্থীর নম্বর এন্ট্রি করা হয়নি।</td></tr>
            </tbody>
        </table>
    </div>

<script>
    // 🗃️ শিক্ষার্থীর মক প্রোফাইল ডাটাবেজ (সেশন এবং আইডি সহ)
    const schoolStudentProfiles = {
        "Class 6": [
            { id: "STU-2026-010", name: "সাকিব", roll: "১০" },
            { id: "STU-2026-011", name: "রাফি", roll: "১১" },
            { id: "STU-2026-012", name: "নাহিদ", roll: "১২" }
        ],
        "Class 7": [
            { id: "STU-2026-020", name: "আরিফ", roll: "০১" },
            { id: "STU-2026-021", name: "সুমন", roll: "০২" }
        ]
    };

    let studentList = []; 
    let editTargetId = null; 

    // ক্লাস সিলেক্ট করলে স্টুডেন্ট ড্রপডাউন লোড হবে
    function loadStudentsByClass(className) {
        let select = document.getElementById('studentSelect');
        select.innerHTML = '<option value="">-- শিক্ষার্থী বেছে নিন --</option>';
        
        if(schoolStudentProfiles[className]) {
            schoolStudentProfiles[className].forEach(stu => {
                select.innerHTML += `<option value="${stu.id}">${stu.name} (${stu.id})</option>`;
            });
        }
        document.getElementById('stuRoll').value = "";
    }

    // ড্রপডাউন থেকে সিলেক্ট করলে রোল অটো-ফিল হবে
    function autoFillStudentProfile(studentId) {
        let className = document.getElementById('resClass').value;
        if(!studentId || !className) return;

        let student = schoolStudentProfiles[className].find(s => s.id === studentId);
        if(student) {
            document.getElementById('stuRoll').value = student.roll;
        }
    }

    function calculateGrade(marks) {
        if (marks >= 80) return { gp: 5.00, grade: "A+" };
        if (marks >= 70) return { gp: 4.00, grade: "A" };
        if (marks >= 60) return { gp: 3.50, grade: "A-" };
        if (marks >= 50) return { gp: 3.00, grade: "B" };
        if (marks >= 40) return { gp: 2.00, grade: "C" };
        if (marks >= 33) return { gp: 1.00, grade: "D" };
        return { gp: 0.00, grade: "F" };
    }

    function getFinalGrade(avgGpa) {
        if (avgGpa >= 5.0) return "A+";
        if (avgGpa >= 4.0) return "A";
        if (avgGpa >= 3.5) return "A-";
        if (avgGpa >= 3.0) return "B";
        if (avgGpa >= 2.0) return "C";
        if (avgGpa >= 1.0) return "D";
        return "F";
    }

    function addStudentMark() {
        let studentSelect = document.getElementById('studentSelect');
        let studentId = studentSelect.value;
        let className = document.getElementById('resClass').value;
        
        if (!studentId) {
            alert("অনুগ্রহ করে প্রোফাইল থেকে শিক্ষার্থী নির্বাচন করুন!");
            return;
        }

        let profile = schoolStudentProfiles[className].find(s => s.id === studentId);
        let ban = parseInt(document.getElementById('marksBan').value) || 0;
        let eng = parseInt(document.getElementById('marksEng').value) || 0;
        let math = parseInt(document.getElementById('marksMath').value) || 0;
        let sci = parseInt(document.getElementById('marksSci').value) || 0;

        let total = ban + eng + math + sci;
        
        let gBan = calculateGrade(ban);
        let gEng = calculateGrade(eng);
        let gMath = calculateGrade(math);
        let gSci = calculateGrade(sci);
        
        let finalGrade = "F";
        if(gBan.gp>0 && gEng.gp>0 && gMath.gp>0 && gSci.gp>0) {
            let avgGpa = (gBan.gp + gEng.gp + gMath.gp + gSci.gp) / 4;
            finalGrade = getFinalGrade(avgGpa);
        }

        if (editTargetId !== null) {
            // এডিট মুড সেভ
            let index = studentList.findIndex(s => s.id === editTargetId);
            if(index !== -1) {
                studentList[index] = { id: editTargetId, name: profile.name, roll: profile.roll, ban, eng, math, sci, total, grade: finalGrade };
            }
            editTargetId = null;
            document.getElementById('submitBtnContainer').innerHTML = `<button class="btn btn-primary" onclick="addStudentMark()"><i class="fa-solid fa-plus"></i> নম্বর যুক্ত করুন</button>`;
            studentSelect.disabled = false;
            document.getElementById('resClass').disabled = false;
        } else {
            // নতুন রেকর্ড যোগ (ডুপ্লিকেট চেক সহ)
            if(studentList.some(s => s.id === studentId)) {
                alert("এই শিক্ষার্থীর নম্বর ইতিমধ্যেই তালিকায় যুক্ত করা হয়েছে! প্রয়োজনে এডিট করুন।");
                return;
            }
            studentList.push({ id: studentId, name: profile.name, roll: profile.roll, ban, eng, math, sci, total, grade: finalGrade });
        }

        clearInputs();
        renderPreviewTable();
    }

    function clearInputs() {
        document.getElementById('studentSelect').value = "";
        document.getElementById('stuRoll').value = "";
        document.getElementById('marksBan').value = "";
        document.getElementById('marksEng').value = "";
        document.getElementById('marksMath').value = "";
        document.getElementById('marksSci').value = "";
    }

    function renderPreviewTable() {
        let tbody = document.getElementById('previewTableBody');
        if (studentList.length === 0) {
            tbody.innerHTML = `<tr id="emptyRow"><td colspan="11" style="color: var(--text-muted);">এখনো কোনো শিক্ষার্থীর নম্বর এন্ট্রি করা হয়নি।</td></tr>`;
            return;
        }

        // 🧠 স্বয়ংক্রিয় লাইভ সর্টিং (টোটাল মার্কস এর ওপর ভিত্তি করে)
        studentList.sort((a, b) => b.total - a.total);

        tbody.innerHTML = "";
        studentList.forEach((stu, index) => {
            let rank = index + 1;
            tbody.innerHTML += `
                <tr>
                    <td><span class="badge badge-pos"># ${rank}</span></td>
                    <td><small>${stu.id}</small></td>
                    <td><b>${stu.roll}</b></td>
                    <td style="text-align: left;">${stu.name}</td>
                    <td>${stu.ban}</td>
                    <td>${stu.eng}</td>
                    <td>${stu.math}</td>
                    <td>${stu.sci}</td>
                    <td style="color: var(--neon-cyan); font-weight: bold;">${stu.total}</td>
                    <td><span class="badge" style="background: ${stu.grade === 'F' ? 'var(--danger-red)' : 'var(--success-green)'}; color:white;">${stu.grade}</span></td>
                    <td>
                        <button class="btn btn-warning" style="padding: 5px 10px; font-size: 0.85rem;" onclick="editStudent('${stu.id}')"><i class="fa-solid fa-edit"></i> এডিট</button>
                        <button class="btn btn-danger" style="padding: 5px 10px; font-size: 0.85rem;" onclick="deleteStudent('${stu.id}')"><i class="fa-solid fa-trash"></i> বাদ দিন</button>
                    </td>
                </tr>
            `;
        });
    }

    function editStudent(id) {
        let stu = studentList.find(s => s.id === id);
        if(!stu) return;

        // এডিট করার সময় ক্লাস এবং ড্রপডাউন লক করা হচ্ছে সুরক্ষার জন্য
        document.getElementById('studentSelect').value = id;
        autoFillStudentProfile(id);
        
        document.getElementById('marksBan').value = stu.ban;
        document.getElementById('marksEng').value = stu.eng;
        document.getElementById('marksMath').value = stu.math;
        document.getElementById('marksSci').value = stu.sci;

        editTargetId = id;
        document.getElementById('studentSelect').disabled = true;
        document.getElementById('resClass').disabled = true;
        document.getElementById('submitBtnContainer').innerHTML = `<button class="btn btn-warning" onclick="addStudentMark()"><i class="fa-solid fa-circle-check"></i> পরিবর্তন সেভ করুন</button>`;
    }

    function deleteStudent(id) {
        if(confirm("আপনি কি নিশ্চিতভাবে এই শিক্ষার্থীর রেকর্ডটি মুছে ফেলতে চান?")) {
            studentList = studentList.filter(s => s.id !== id);
            renderPreviewTable();
        }
    }

    function publishResults() {
        if(studentList.length === 0) {
            alert("পাবলিশ করার মতো কোনো ডেটা নেই!");
            return;
        }
        
        let examMetaData = {
            class: document.getElementById('resClass').value,
            examType: document.getElementById('resExamType').value,
            publishedDate: new Date().toLocaleDateString('bn-BD'),
            meritData: studentList
        };

        localStorage.setItem('school_published_results', JSON.stringify(examMetaData));
        alert(`🎉 অভিনন্দন! ${examMetaData.class}-এর "${examMetaData.examType}"-এর চূড়ান্ত মেধা তালিকা সফলভাবে পাবলিশ করা হয়েছে।`);
    }

    // ফার্স্ট টাইম পেজ লোডে ডিফল্ট ক্লাস লোড করা
    window.onload = function() {
        loadStudentsByClass(document.getElementById('resClass').value);
    };
</script>
</body>
</html>
