<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মাস্টার ক্লাস রুটিন মেকার - অল-ইন-ওয়ান</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark-blue: #0b132b;
            --bg-card: #1c2541;
            --neon-cyan: #00b4d8;
            --text-light: #f8f9fa;
            --text-muted: #6c757d;
            --border-color: #2a3447;
            --success-green: #2a9d8f;
            --warning-amber: #f4a261;
            --accent-blue: #3a86ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: transparent; color: var(--text-light); padding: 10px; }
        .panel { background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border-color); padding: 25px; margin-bottom: 25px; }
        h2, h3 { margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; color: var(--neon-cyan); display: flex; align-items: center; gap: 10px; }
        
        /* প্রধান ৩টি বিভাগের ট্যাব */
        .main-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); }
        .main-tab-btn { flex: 1; padding: 14px; background: #1e293b; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; text-align: center; }
        .main-tab-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }

        /* সাব-ট্যাব (সেটআপ ও রুটিন) */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; background: var(--bg-dark-blue); border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--neon-cyan); color: var(--bg-dark-blue); border-color: var(--neon-cyan); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .sub-section { margin-bottom: 25px; padding: 15px; background: #111a36; border-radius: 8px; border: 1px solid var(--border-color); }
        .sub-section h4 { color: var(--warning-amber); margin-bottom: 15px; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }

        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-weight: 600; font-size: 0.85rem; color: var(--text-light); }
        select, input { padding: 8px 12px; background: var(--bg-dark-blue); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-light); outline: none; font-size: 0.9rem; }
        
        .teacher-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .teacher-box { display: flex; align-items: center; gap: 8px; background: var(--bg-dark-blue); padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); }
        .teacher-box span { color: var(--neon-cyan); font-weight: bold; font-size: 0.85rem; width: 20px; }
        .teacher-box input { width: 100%; padding: 4px 8px; background: #0b132b; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: var(--bg-dark-blue); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: center; border: 1px solid var(--border-color); vertical-align: middle; }
        th { background: #111a36; color: var(--neon-cyan); font-size: 0.95rem; line-height: 1.4; }
        
        .cell-combo { display: flex; flex-direction: column; gap: 6px; align-items: center; width: 100%; }
        .routine-select { width: 100%; padding: 6px; background: #16223f; border: 1px solid var(--border-color); color: var(--text-light); border-radius: 4px; font-size: 0.85rem; cursor: pointer; outline: none; text-align-last: center; }
        .routine-select.subject-sel { color: var(--warning-amber); font-weight: bold; }
        .routine-select.teacher-sel { color: #00f5d4; }
        
        .class-header { text-align: left; font-weight: bold; background: #16223f; width: 230px; }
        .class-header small { color: #a2a8b4; display: block; margin-top: 4px; font-weight: normal; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 6px; transition: 0.3s; }
        .btn-primary { background: var(--neon-cyan); color: var(--bg-dark-blue); }
        .btn-success { background: var(--success-green); color: white; }
        .btn-print { background: #e63946; color: white; }

        .print-header-area { display: none; text-align: center; margin-bottom: 20px; color: black; }
        .print-text { display: none; }

        /* 🖨️ প্রিন্ট কনফিগারেশন */
        @media print {
            body { background: white !important; color: black !important; padding: 0; }
            .main-tabs, .tabs, .btn, #setup-tab, .no-print-controls { display: none !important; }
            #routine-tab { background: white !important; border: none !important; padding: 0 !important; margin: 0 !important; }
            .print-header-area { display: block !important; }
            table { width: 100% !important; border-collapse: collapse !important; background: white !important; margin-top: 10px; }
            th, td { border: 1px solid #000 !important; color: black !important; padding: 10px !important; background: white !important; }
            th { color: black !important; background: #f2f2f2 !important; }
            .class-header { background: white !important; color: black !important; }
            .class-header small { color: #333 !important; }
            .routine-select { display: none !important; }
            .print-text { display: block !important; font-size: 0.85rem; font-weight: bold; text-align: center; color: black !important; line-height: 1.4; }
        }
    </style>
</head>
<body>

    <div class="main-tabs" class="no-print">
        <button class="main-tab-btn active" id="m_btn_part1" onclick="switchMainPart('part1')"><i class="fa-solid fa-children"></i> প্লে - দ্বিতীয় শ্রেণি</button>
        <button class="main-tab-btn" id="m_btn_part2" onclick="switchMainPart('part2')"><i class="fa-solid fa-graduation-cap"></i> তৃতীয় - পঞ্চম শ্রেণি</button>
        <button class="main-tab-btn" id="m_btn_part3" onclick="switchMainPart('part3')"><i class="fa-solid fa-school-flag"></i> ষষ্ঠ - দশম শ্রেণি</button>
    </div>

    <div class="tabs" class="no-print">
        <button class="tab-btn active" id="sub_btn_setup" onclick="switchSubTab('setup-tab')"><i class="fa-solid fa-gears"></i> ১. মাস্টার সেটিংস প্যানেল</button>
        <button class="tab-btn" id="sub_btn_routine" onclick="switchSubTab('routine-tab')"><i class="fa-solid fa-calendar-days"></i> ২. রুটিন গ্রিড ও প্রিন্ট</button>
    </div>

    <div id="setup-tab" class="tab-content active panel">
        <h2 id="setupTitle"><i class="fa-solid fa-sliders"></i> রুটিন কনফিগারেশন (প্লে - ২য়)</h2>
        
        <div class="sub-section">
            <h4><i class="fa-solid fa-school"></i> স্কুলের নাম এন্ট্রি</h4>
            <div class="form-group" style="max-width: 500px;">
                <input type="text" id="schoolNameInput" value="কাউন্দিয়া মডেল হাই স্কুল" placeholder="আপনার স্কুলের নাম লিখুন">
            </div>
        </div>

        <div class="sub-section">
            <h4><i class="fa-solid fa-user-tie"></i> স্কুলের শিক্ষক তালিকা (সর্বমোট ১৫ জন)</h4>
            <div class="teacher-grid" id="teacherInputsContainer"></div>
        </div>

        <div class="sub-section">
            <h4><i class="fa-solid fa-chalkboard-user"></i> ক্লাস টিচার নির্ধারণ</h4>
            <div class="grid-inputs" id="classTeacherContainer"></div>
        </div>

        <div class="sub-section">
            <h4><i class="fa-solid fa-clock"></i> পিরিয়ড ও ঘণ্টার সময়সূচী পরিবর্তন</h4>
            <div class="grid-inputs" id="timeSlotsContainer">
                </div>
        </div>

        <button class="btn btn-primary" onclick="saveMasterSetup()"><i class="fa-solid fa-floppy-disk"></i> সকল সেটিংস সেভ করুন</button>
    </div>

    <div id="routine-tab" class="tab-content panel">
        
        <div class="print-header-area">
            <h1 id="printSchoolName" style="font-size: 24px; margin-bottom: 5px;">স্কুলের নাম</h1>
            <h3 id="printPartTitle" style="font-size: 16px; margin-bottom: 5px;">শ্রেণি ভিত্তিক সাপ্তাহিক মাস্টার রুটিন</h3>
            <h4 id="printRoutineDay" style="font-size: 14px; border: 1px solid black; display: inline-block; padding: 4px 15px; background: #f2f2f2; margin-top: 5px;">বার: শনি</h4>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;" class="no-print-controls">
            <h3 id="gridTitle"><i class="fa-solid fa-table"></i> রুটিন এডিটর গ্রিড (প্লে - ২য় শ্রেণি)</h3>
            <div style="display: flex; gap: 10px; align-items: center;">
                <label for="routineDay" style="color: var(--text-light); font-weight: bold;">দিন:</label>
                <select id="routineDay" onchange="loadRoutineByDay()">
                    <option value="শনিবার">শনিবার</option>
                    <option value="রবিবার">রবিবার</option>
                    <option value="সোমবার">সোমবার</option>
                    <option value="মঙ্গলবার">মঙ্গলবার</option>
                    <option value="বুধবার">বুধবার</option>
                    <option value="বৃহস্পতিবার">বৃহস্পতিবার</option>
                </select>
                <button class="btn btn-success" onclick="saveCurrentDayRoutine()"><i class="fa-solid fa-circle-check"></i> রুটিন সেভ করুন</button>
                <button class="btn btn-print" onclick="printRoutine()"><i class="fa-solid fa-print"></i> রুটিন প্রিন্ট</button>
            </div>
        </div>

        <table id="masterRoutineTable">
            <thead>
                <tr id="tableHeaderRow">
                    </tr>
            </thead>
            <tbody id="routineTableBody"></tbody>
        </table>
    </div>

<script>
    // গ্লোবাল কনফিগারেশন ডাটাবেজ (৩টি ভাগ সুনির্দিষ্ট বিষয় সহ)
    let currentMainPart = 'part1'; // ডিফল্ট পার্ট
    let currentSubTab = 'setup-tab';

    const subjectsMapping = {
        part1: ["বাংলা", "ইংরেজি", "গণিত", "পরিবেশ", "ধর্ম"],
        part2: ["বাংলা", "ইংরেজি", "গণিত", "প্রাথমিক বিজ্ঞান", "বাওবি", "ধর্ম"],
        part3: ["বাংলা", "বাংলা ১ম", "ইংরেজি", "ইংরেজি ২য়", "গণিত", "বিজ্ঞান", "ইতিহাস ও সামাজিক বিজ্ঞান", "ডিজিটাল প্রযুক্তি", "ধর্ম", "শিল্প ও সংস্কৃতি", "পদার্থবিজ্ঞান", "রসায়ন", "জীববিজ্ঞান", "হিসাব বিজ্ঞান", "ব্যবসায় উদ্যোগ"]
    };

    const classesMapping = {
        part1: [
            { key: "play_shapla", name: "প্লে গ্রুপ (শাপলা)" },
            { key: "play_golap", name: "প্লে গ্রুপ (গোলাপ)" },
            { key: "nursery_joba", name: "নার্সারি (জবা)" },
            { key: "nursery_bokul", name: "নার্সারি (বকুল)" },
            { key: "class_1", name: "প্রথম শ্রেণি (শিউলি)" },
            { key: "class_2", name: "দ্বিতীয় শ্রেণি" }
        ],
        part2: [
            { key: "class_3", name: "তৃতীয় শ্রেণি" },
            { key: "class_4", name: "চতুর্থ শ্রেণি" },
            { key: "class_5", name: "পঞ্চম শ্রেণি" }
        ],
        part3: [
            { key: "class_6", name: "ষষ্ঠ শ্রেণি" },
            { key: "class_7", name: "সপ্তম শ্রেণি" },
            { key: "class_8", name: "অষ্টম শ্রেণি" },
            { key: "class_9_sci", name: "নবম শ্রেণি (বিজ্ঞান)" },
            { key: "class_9_com", name: "নবম শ্রেণি (ব্যবসায় শিক্ষা)" },
            { key: "class_9_arts", name: "নবম শ্রেণি (মানবিক)" },
            { key: "class_10_sci", name: "দশম শ্রেণি (বিজ্ঞান)" },
            { key: "class_10_com", name: "দশম শ্রেণি (ব্যবসায় শিক্ষা)" },
            { key: "class_10_arts", name: "দশম শ্রেণি (মানবিক)" }
        ]
    };

    const defaultTeachers = ["আনিকা", "শিপন", "আরাফাত", "মনিকা", "খালেদা", "কেয়া", "কাকলি", "শারমিন", "জান্নাত", "রিমা", "সাকিব", "রফিক", "মিতা", "রনি", "হাসান"];

    let teachersArray = [];
    let classTeachersMapping = {};
    let timeSlots = {};

    // প্রধান ৩টি পার্ট পরিবর্তনের ফাংশন
    function switchMainPart(partId) {
        currentMainPart = partId;
        document.querySelectorAll('.main-tab-btn').forEach(btn => btn.classList.remove('active'));
        if(partId === 'part1') document.getElementById('m_btn_part1').classList.add('active');
        if(partId === 'part2') document.getElementById('m_btn_part2').classList.add('active');
        if(partId === 'part3') document.getElementById('m_btn_part3').classList.add('active');

        // টাইটেল চেঞ্জ
        let textMap = { part1: "প্লে - ২য় শ্রেণি", part2: "৩য় - ৫ম শ্রেণি", part3: "৬ষ্ঠ - ১০ম শ্রেণি" };
        document.getElementById('setupTitle').innerHTML = `<i class="fa-solid fa-sliders"></i> রুটিন কনফিগারেশন (${textMap[partId]})`;
        document.getElementById('gridTitle').innerHTML = `<i class="fa-solid fa-table"></i> রুটিন এডিটর গ্রিড (${textMap[partId]})`;

        initSetupPanel();
        if(currentSubTab === 'routine-tab') {
            updateTableHeaders();
            buildRoutineGrid();
        }
    }

    // সাব-ট্যাব পরিবর্তনের ফাংশন
    function switchSubTab(tabId) {
        currentSubTab = tabId;
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        
        if(tabId === 'setup-tab') document.getElementById('sub_btn_setup').classList.add('active');
        if(tabId === 'routine-tab') document.getElementById('sub_btn_routine').classList.add('active');
        
        if(tabId === 'routine-tab') {
            updateTableHeaders();
            buildRoutineGrid(); 
        }
    }

    // প্যানেল ইনিশিয়ালাইজেশন ইঞ্জিন
    function initSetupPanel() {
        // ১. ১৫ জন শিক্ষক লোড
        let tContainer = document.getElementById('teacherInputsContainer');
        tContainer.innerHTML = "";
        let savedTeachers = localStorage.getItem('school_teachers_list');
        teachersArray = savedTeachers ? JSON.parse(savedTeachers) : [...defaultTeachers];

        for (let i = 0; i < 15; i++) {
            tContainer.innerHTML += `<div class="teacher-box"><span>${i + 1}.</span><input type="text" id="t_input_${i}" value="${teachersArray[i] || ''}"></div>`;
        }

        // ২. কারেন্ট পার্টের ক্লাস টিচার লোড
        let ctContainer = document.getElementById('classTeacherContainer');
        ctContainer.innerHTML = "";
        let savedCT = localStorage.getItem(`class_teachers_mapping_${currentMainPart}`);
        classTeachersMapping = savedCT ? JSON.parse(savedCT) : {};

        classesMapping[currentMainPart].forEach(cls => {
            let currentCT = classTeachersMapping[cls.key] || "";
            let optionsHtml = teachersArray.map(t => `<option value="${t}" ${currentCT === t ? 'selected' : ''}>${t}</option>`).join('');
            
            ctContainer.innerHTML += `
                <div class="form-group">
                    <label>${cls.name}:</label>
                    <select id="ct_select_${cls.key}">
                        <option value="">-- সিলেক্ট ক্লাস টিচার --</option>
                        ${optionsHtml}
                    </select>
                </div>`;
        });

        // ৩. স্কুলের নাম
        document.getElementById('schoolNameInput').value = localStorage.getItem('school_name') || "কাউন্দিয়া链 মডেল হাই স্কুল";
        
        // ৪. কারেন্ট পার্টের সময়সূচী জেনারেটর (১ম পার্টে ৪টি, বাকিগুলোতে ৬টি পিরিয়ড)
        let timeContainer = document.getElementById('timeSlotsContainer');
        timeContainer.innerHTML = "";
        let savedTime = localStorage.getItem(`routine_time_slots_${currentMainPart}`);
        
        let totalPeriods = (currentMainPart === 'part1') ? 4 : 6;
        let defaultTimes = (currentMainPart === 'part1') 
            ? {p1:"০৮:০০ - ০৮:৪০", p2:"০৮:৪০ - ০৯:২০", p3:"০৯:২০ - ০৯:৫০", p4:"০৯:৫০ - ১০:২০"}
            : {p1:"১০:৩০ - ১১:১০", p2:"১১:১০ - ১১:৫০", p3:"১১:৫০ - ১২:৩০", p4:"১২:৩০ - ০১:১০", p5:"০১:১০ - ০১:৫০", p6:"০১:৫০ - ০২:৩০"};

        timeSlots = savedTime ? JSON.parse(savedTime) : defaultTimes;

        for(let p = 1; p <= totalPeriods; p++) {
            timeContainer.innerHTML += `
                <div class="form-group">
                    <label>${p === 1 ? '১ম' : p === 2 ? '২য়' : p === 3 ? '৩য়' : p === 4 ? '৪র্থ' : p === 5 ? '৫ম' : '৬ষ্ঠ'} ঘণ্টা সময়:</label>
                    <input type="text" id="time_p${p}" value="${timeSlots['p'+p] || ''}">
                </div>`;
        }
    }

    // সেটিংস সেভ করা
    function saveMasterSetup() {
        // ১৫ জন শিক্ষক সেভ
        teachersArray = [];
        for (let i = 0; i < 15; i++) {
            let val = document.getElementById(`t_input_${i}`).value.trim();
            if(val) teachersArray.push(val);
        }
        localStorage.setItem('school_teachers_list', JSON.stringify(teachersArray));

        // ক্লাস টিচার সেভ
        classesMapping[currentMainPart].forEach(cls => {
            classTeachersMapping[cls.key] = document.getElementById(`ct_select_${cls.key}`).value;
        });
        localStorage.setItem(`class_teachers_mapping_${currentMainPart}`, JSON.stringify(classTeachersMapping));

        // স্কুলের নাম সেভ
        localStorage.setItem('school_name', document.getElementById('schoolNameInput').value.trim());

        // পিরিয়ড সময় সেভ
        let totalPeriods = (currentMainPart === 'part1') ? 4 : 6;
        timeSlots = {};
        for(let p = 1; p <= totalPeriods; p++) {
            timeSlots['p'+p] = document.getElementById(`time_p${p}`).value.trim();
        }
        localStorage.setItem(`routine_time_slots_${currentMainPart}`, JSON.stringify(timeSlots));

        alert("🎉 এই বিভাগের সকল কনফিগারেশন ডাটাবেজে সংরক্ষিত হয়েছে!");
        initSetupPanel(); 
    }

    // টেবিল হেডার ডাইনামিক করা
    function updateTableHeaders() {
        let headerRow = document.getElementById('tableHeaderRow');
        let totalPeriods = (currentMainPart === 'part1') ? 4 : 6;
        
        let html = `<th>শ্রেণি / ঘণ্টা<br>সময়</th>`;
        let labelArr = ["১ম ঘণ্টা", "২য় ঘণ্টা", "৩য় ঘণ্টা", "৪র্থ ঘণ্টা", "৫ম ঘণ্টা", "৬ষ্ঠ ঘণ্টা"];
        
        for(let p = 1; p <= totalPeriods; p++) {
            html += `<th>${labelArr[p-1]}<br><small>${timeSlots['p'+p] || ''}</small></th>`;
        }
        headerRow.innerHTML = html;
    }

    // ডাইনামিক রুটিন গ্রিড জেনারেটর (The Universal Fixed Engine)
    function buildRoutineGrid() {
        let tbody = document.getElementById('routineTableBody');
        tbody.innerHTML = "";

        let savedRoutine = localStorage.getItem(`master_routine_${currentMainPart}`);
        let masterRoutineData = savedRoutine ? JSON.parse(savedRoutine) : {};

        let selectedDay = document.getElementById('routineDay').value;
        if(!masterRoutineData[selectedDay]) masterRoutineData[selectedDay] = {};

        let currentSubjects = subjectsMapping[currentMainPart];
        let totalPeriods = (currentMainPart === 'part1') ? 4 : 6;

        classesMapping[currentMainPart].forEach(cls => {
            let currentCT = classTeachersMapping[cls.key] || "নির্ধারিত নাই";
            let rowHtml = `<tr><td class="class-header">${cls.name}<small>ক্লাস টিচার: ${currentCT}</small></td>`;
            
            for(let period = 1; period <= totalPeriods; period++) {
                let subKey = `${cls.key}_p${period}_sub`;
                let teaKey = `${cls.key}_p${period}_tea`;

                let savedSub = masterRoutineData[selectedDay][subKey] || "";
                let savedTea = masterRoutineData[selectedDay][teaKey] || "";

                rowHtml += `<td>
                    <div class="cell-combo">
                        <select class="routine-select subject-sel" id="${subKey}">
                            <option value="">-- বিষয় --</option>
                            ${currentSubjects.map(sub => `<option value="${sub}" ${savedSub === sub ? 'selected' : ''}>${sub}</option>`).join('')}
                        </select>
                        <select class="routine-select teacher-sel" id="${teaKey}">
                            <option value="">-- শিক্ষক --</option>
                            ${teachersArray.map(tea => `<option value="${tea}" ${savedTea === tea ? 'selected' : ''}>${tea}</option>`).join('')}
                        </select>
                    </div>
                    <div class="print-text">
                        ${savedSub ? savedSub : '-'}<br>
                        <span style="font-weight: normal; font-size:0.8rem;">${savedTea ? '(' + savedTea + ')' : ''}</span>
                    </div>
                </td>`;
            }
            rowHtml += `</tr>`;
            tbody.innerHTML += rowHtml;
        });
    }

    // রুটিন ডাটা সেভ করা
    function saveCurrentDayRoutine() {
        let savedRoutine = localStorage.getItem(`master_routine_${currentMainPart}`);
        let masterRoutineData = savedRoutine ? JSON.parse(savedRoutine) : {};

        let selectedDay = document.getElementById('routineDay').value;
        if(!masterRoutineData[selectedDay]) masterRoutineData[selectedDay] = {};

        let totalPeriods = (currentMainPart === 'part1') ? 4 : 6;

        classesMapping[currentMainPart].forEach(cls => {
            for(let period = 1; period <= totalPeriods; period++) {
                let subKey = `${cls.key}_p${period}_sub`;
                let teaKey = `${cls.key}_p${period}_tea`;

                masterRoutineData[selectedDay][subKey] = document.getElementById(subKey).value;
                masterRoutineData[selectedDay][teaKey] = document.getElementById(teaKey).value;
            }
        });

        localStorage.setItem(`master_routine_${currentMainPart}`, JSON.stringify(masterRoutineData));
        alert(`🎉 ${selectedDay} বারের রুটিন ডাটাবেজে সফলভাবে সংরক্ষিত হয়েছে!`);
    }

    function loadRoutineByDay() {
        buildRoutineGrid();
    }

    // প্রিন্ট ইঞ্জিন
    function printRoutine() {
        let currentDay = document.getElementById('routineDay').value;
        let textMap = { part1: "(প্লে - দ্বিতীয় শ্রেণি)", part2: "(তৃতীয় - পঞ্চম শ্রেণি)", part3: "(ষষ্ঠ - দশম শ্রেণি)" };
        
        document.getElementById('printSchoolName').innerText = localStorage.getItem('school_name') || "কাуন্দিয়া মডেল হাই স্কুল";
        document.getElementById('printPartTitle').innerText = "শ্রেণি ভিত্তিক সাপ্তাহিক মাস্টার রুটিন " + textMap[currentMainPart];
        document.getElementById('printRoutineDay').innerText = "বার: " + currentDay;
        window.print();
    }

    window.onload = function() {
        initSetupPanel();
    };
</script>
</body>
