<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নিবন্ধন ফর্ম - কাউন্দিয়া শিক্ষা প্রতিষ্ঠান পোর্টাল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-teal-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-graduation-cap"></i> কাউন্দিয়া শিক্ষা প্রতিষ্ঠান পোর্টাল
            </div>
            <div>
                <a href="institutions.html" class="text-sm bg-teal-700 hover:bg-teal-600 px-3 py-2 rounded-lg transition flex items-center gap-1">
                    <i class="fa-solid fa-list"></i> প্রতিষ্ঠানের তালিকা
                </a>
            </div>
        </div>
    </nav>

    <div class="flex-grow container mx-auto px-4 py-10 flex justify-center items-center">
        <div class="bg-white w-full max-w-2xl p-6 md:p-8 rounded-2xl shadow-md border border-gray-200">
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-teal-50 text-teal-600 rounded-full flex items-center justify-center mx-auto text-2xl shadow-sm border border-teal-100">
                    <i class="fa-solid fa-school-flag"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-gray-800 mt-4">নতুন প্রতিষ্ঠান নিবন্ধন ফর্ম</h1>
                <p class="text-sm text-gray-500 mt-1">সঠিক তথ্য দিয়ে ফর্মটি পূরণ করুন। অ্যাডমিন অনুমোদনের পর তালিকাভুক্ত হবে।</p>
            </div>

            <form id="registration-form" onsubmit="handleRegistration(event)" class="space-y-5">
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 flex items-center gap-1">
                        <i class="fa-solid fa-heading text-xs text-gray-400"></i> প্রতিষ্ঠানের নাম
                    </label>
                    <input type="text" id="inst-name" required placeholder="যেমন: কাউন্দিয়া মডেল হাই স্কুল" class="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50 text-sm transition">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5 flex items-center gap-1">
                            <i class="fa-solid fa-fingerprint text-xs text-gray-400"></i> EIIN বা ইউনিক আইডি
                        </label>
                        <input type="number" id="inst-id" required placeholder="যেমন: ১০০০০১" class="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50 text-sm transition">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5 flex items-center gap-1">
                            <i class="fa-solid fa-layer-group text-xs text-gray-400"></i> প্রতিষ্ঠানের ধরন
                        </label>
                        <select id="inst-type" required class="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50 text-sm transition">
                            <option value="" disabled selected>ধরন নির্বাচন করুন</option>
                            <option value="kindergarten">কিন্ডারগার্টেন</option>
                            <option value="primary">প্রাইমারি</option>
                            <option value="high-school">হাই স্কুল</option>
                            <option value="madrasah">মাদরাসা</option>
                            <option value="kg-high-school">কিন্ডারগার্টেন অ্যান্ড হাই স্কুল</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5 flex items-center gap-1">
                            <i class="fa-solid fa-map-location-dot text-xs text-gray-400"></i> এলাকার নাম
                        </label>
                        <select id="inst-area" required class="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50 text-sm transition">
                            <option value="" disabled selected>এলাকা নির্বাচন করুন</option>
                            <option value="মধ্য কাউন্দিয়া">১. মধ্য কাউন্দিয়া</option>
                            <option value="উত্তর কাউন্দিয়া">২. উত্তর কাউন্দিয়া</option>
                            <option value="দক্ষিণ কাউন্দিয়া">৩. দক্ষিণ কাউন্দিয়া</option>
                            <option value="পশ্চিমপাড়া">৪. পশ্চিমপাড়া</option>
                            <option value="বাগসাত্রা">৫.  বাগসাত্রা</option>
                            <option value="সিংগাসার">৬. সিংগাসার</option>
                            <option value="নয়াবাজার">৭. নয়াবাজার</option>
                            <option value="পাঁচকানী">৮. পাঁচকানী</option>
                            <option value="ঘাসিরদিয়া">৯. ঘাসিরদিয়া</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5 flex items-center gap-1">
                            <i class="fa-solid fa-list-ol text-xs text-gray-400"></i> ওয়ার্ড নম্বর
                        </label>
                        <select id="inst-ward" required class="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50 text-sm transition">
                            <option value="" disabled selected>ওয়ার্ড নির্বাচন করুন</option>
                            <option value="1">Ward 1</option>
                            <option value="2">Ward 2</option>
                            <option value="3">Ward 3</option>
                            <option value="4">Ward 4</option>
                            <option value="5">Ward 5</option>
                            <option value="6">Ward 6</option>
                            <option value="7">Ward 7</option>
                            <option value="8">Ward 8</option>
                            <option value="9">Ward 9</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5 flex items-center gap-1">
                            <i class="fa-solid fa-user text-xs text-gray-400"></i> দায়িত্বপ্রাপ্ত ব্যক্তি / প্রধান
                        </label>
                        <input type="text" id="inst-leader" required placeholder="প্রধান শিক্ষক / পরিচালক" class="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50 text-sm transition">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5 flex items-center gap-1">
                            <i class="fa-solid fa-phone text-xs text-gray-400"></i> মোবাইল নম্বর
                        </label>
                        <input type="tel" id="inst-phone" required placeholder="01XXXXXXXXX" class="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50 text-sm transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 flex items-center gap-1">
                        <i class="fa-solid fa-lock text-xs text-gray-400"></i> একটি গোপন পাসওয়ার্ড সেট করুন
                    </label>
                    <input type="password" id="inst-password" required placeholder="পরবর্তীতে ড্যাশবোর্ডে লগইন করার জন্য লাগবে" class="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50 text-sm transition">
                </div>

                <button type="submit" class="w-full bg-teal-700 hover:bg-teal-800 text-white font-bold p-3 rounded-xl transition shadow-md flex items-center justify-center gap-2 mt-4">
                    <i class="fa-solid fa-paper-plane text-sm"></i> আবেদনের জন্য পাঠান
                </button>

            </form>
            </div>
    </div>

    <script>
        function handleRegistration(event) {
            event.preventDefault(); 

            const name = document.getElementById('inst-name').value.trim();
            const id = document.getElementById('inst-id').value.trim();
            const type = document.getElementById('inst-type').value;
            const area = document.getElementById('inst-area').value;
            const ward = document.getElementById('inst-ward').value;
            const leader = document.getElementById('inst-leader').value.trim();
            const phone = document.getElementById('inst-phone').value.trim();
            const password = document.getElementById('inst-password').value;

            let institutions = JSON.parse(localStorage.getItem('institutions')) || [];

            // ডুপ্লিকেট EIIN চেক
            const isExist = institutions.some(item => item.id.toString() === id.toString() || (item.eiin && item.eiin.toString() === id.toString()));
            if (isExist) {
                alert('দুঃখিত! এই EIIN/ID নম্বর দিয়ে ইতিমধ্যে একটি প্রতিষ্ঠান যুক্ত করা আছে।');
                return;
            }

            // নতুন প্রতিষ্ঠানের অবজেক্ট মেকানিজম (যা ড্যাশবোর্ড ও মেইন পেজের সাথে কানেক্টেড)
            const newInstitution = {
                id: id,
                eiin: id, 
                name: name,
                type: type,
                address: `${area}, Ward ${ward}, কাউন্দিয়া`, 
                leader: leader,
                phone: phone,
                password: password,
                pass: password, 
                status: 'pending' // অ্যাডমিনের অনুমোদনের অপেক্ষায় থাকবে
            };

            institutions.push(newInstitution);
            localStorage.setItem('institutions', JSON.stringify(institutions));

            alert('আপনার ফর্মটি সফলভাবে সাবমিট হয়েছে! Admin প্যানেল থেকে Approve করার পর এটি লিস্টে দেখা যাবে।');
            
            document.getElementById('registration-form').reset();
            window.location.href = "institutions.html";
        }
    </script>
</body>
</html>
