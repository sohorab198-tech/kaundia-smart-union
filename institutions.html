<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কাউন্দিয়া শিক্ষা প্রতিষ্ঠান পোর্টাল - প্রতিষ্ঠানের তালিকা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans antialiased">

    <nav class="bg-teal-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-graduation-cap"></i> কাউন্দিয়া শিক্ষা প্রতিষ্ঠান পোর্টাল
            </div>
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-sm hover:text-teal-200 transition flex items-center gap-1">
                    <i class="fa-solid fa-house"></i> হোমপেজ
                </a>
                <a href="reg-form.html" class="bg-teal-600 hover:bg-teal-700 text-white text-xs py-2 px-3 rounded-lg font-medium transition flex items-center gap-1">
                    <i class="fa-solid fa-plus"></i> নতুন প্রতিষ্ঠান যুক্ত করুন
                </a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        
        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 mb-8 flex flex-col lg:flex-row gap-4 items-center">
            
            <div class="w-full lg:w-1/3 relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input type="text" id="search-eiin" oninput="filterInstitutions()" placeholder="EIIN বা আইডি নম্বর দিয়ে খুঁজুন..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-teal-500 transition">
            </div>

            <div class="w-full lg:w-1/3">
                <select id="filter-area" onchange="filterInstitutions()" class="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-teal-500">
                    <option value="all">সব এলাকা (পুরো কাউন্দিয়া)</option>
                    <option value="मध्य কাউন্দিয়া">মধ্য কাউন্দিয়া</option>
                    <option value="উত্তর কাউন্দিয়া">উত্তর কাউন্দিয়া</option>
                    <option value="দক্ষিণ কাউন্দিয়া">দক্ষিণ কাউন্দিয়া</option>
                    <option value="পশ্চিমপাড়া">পশ্চিমপাড়া</option>
                    <option value="বাগসাত্রা">বাগসাত্রা</option>
                    <option value="সিংগাসার">সিংগাসার</option>
                    <option value="নয়াবাজার">নয়াবাজার</option>
                    <option value="পাঁচকানী">পাঁচকানী</option>
                    <option value="ঘাসিরদিয়া">ঘাসিরদিয়া</option>
                </select>
            </div>

            <div class="w-full lg:w-1/3">
                <select id="filter-type" onchange="filterInstitutions()" class="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-teal-500">
                    <option value="all">সব ধরনের প্রতিষ্ঠান</option>
                    <option value="kindergarten">কিন্ডারগার্টেন</option>
                    <option value="primary">প্রাইমারি</option>
                    <option value="high-school">হাই স্কুল</option>
                    <option value="madrasah">মাদরাসা</option>
                    <option value="kg-high-school">কিন্ডারগার্টেন অ্যান্ড হাই স্কুল</option>
                </select>
            </div>
        </div>

        <div id="institutions-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

    </div>

    <script>
        // ১. আগে থেকেই ৫টি স্কুলের ডাটা প্রিপেয়ার করে রাখা (Default Data)
        const defaultInstitutions = [
            { id: "100001", eiin: "100001", name: "কাউন্দিয়া মডেল হাই স্কুল", type: "kindergarten", address: "বাগসাত্রা, কাউন্দিয়া", leader: "প্রধান শিক্ষক", phone: "01700000001", password: "123", status: "approved" },
            { id: "100002", eiin: "100002", name: "কাউন্দিয়া শহীদ স্মৃতি হাই স্কুল", type: "high-school", address: "মধ্য কাউন্দিয়া, কাউন্দিয়া", leader: "প্রধান শিক্ষক", phone: "01700000002", password: "123", status: "approved" },
            { id: "100003", eiin: "100003", name: "কাউন্দিয়া সরকারি প্রাথমিক বিদ্যালয়", type: "primary", address: "পশ্চিমপাড়া, কাউন্দিয়া", leader: "প্রধান শিক্ষক", phone: "01700000003", password: "123", status: "approved" },
            { id: "100004", eiin: "100004", name: "সিংগাসার সরকারি প্রাথমিক বিদ্যালয়", type: "primary", address: "সিংগাসার, কাউন্দিয়া", leader: "প্রধান শিক্ষক", phone: "01700000004", password: "123", status: "approved" },
            { id: "100005", eiin: "100005", name: "এফ. এ. মডার্ণ স্কুল", type: "kindergarten", address: "পাঁচকানী, কাউন্দিয়া", leader: "প্রধান শিক্ষক", phone: "01700000005", password: "123", status: "approved" }
        ];

        document.addEventListener("DOMContentLoaded", function() {
            // যদি লোকাল স্টোরেজ একদম খালি থাকে, তবে আমাদের ৫টি স্কুল সেট করে দেওয়া হবে
            if (!localStorage.getItem('institutions')) {
                localStorage.setItem('institutions', JSON.stringify(defaultInstitutions));
            }
            filterInstitutions(); 
        });

        function filterInstitutions() {
            const grid = document.getElementById('institutions-grid');
            if (!grid) return;

            const institutions = JSON.parse(localStorage.getItem('institutions')) || [];
            let filtered = institutions.filter(item => item.status === 'approved');

            // এলাকা ফিল্টার লজিক
            const areaValue = document.getElementById('filter-area').value;
            if (areaValue !== 'all') {
                filtered = filtered.filter(item => item.address && item.address.includes(areaValue));
            }

            // ধরন ফিল্টার লজিক
            const typeValue = document.getElementById('filter-type').value;
            if (typeValue !== 'all') {
                filtered = filtered.filter(item => item.type === typeValue);
            }

            // EIIN সার্চ লজিক
            const searchValue = document.getElementById('search-eiin').value.trim();
            if (searchValue !== '') {
                filtered = filtered.filter(item => {
                    const idMatch = item.id ? item.id.toString().includes(searchValue) : false;
                    const eiinMatch = item.eiin ? item.eiin.toString().includes(searchValue) : false;
                    return idMatch || eiinMatch;
                });
            }

            grid.innerHTML = '';

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-500">
                        <i class="fa-regular fa-folder-open text-4xl mb-2 text-gray-300 block"></i>
                        কোনো প্রতিষ্ঠানের তথ্য পাওয়া যায়নি।
                    </div>`;
                return;
            }

            filtered.forEach(item => {
                // ধরন অনুযায়ী সুন্দর আলাদা আলাদা কালার ব্যাজ
                let typeBadgeColor = "bg-blue-50 text-blue-700 border-blue-200";
                if(item.type === 'primary') typeBadgeColor = "bg-orange-50 text-orange-700 border-orange-200";
                if(item.type === 'high-school') typeBadgeColor = "bg-teal-50 text-teal-700 border-teal-200";
                if(item.type === 'madrasah') typeBadgeColor = "bg-emerald-50 text-emerald-700 border-emerald-200";
                if(item.type === 'kg-high-school') typeBadgeColor = "bg-purple-50 text-purple-700 border-purple-200";

                const card = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex flex-col justify-between hover:shadow-md transition duration-200">
                        <div>
                            <span class="text-[11px] px-2.5 py-1 rounded-full font-bold border ${typeBadgeColor}">
                                ${getTranslatedType(item.type)}
                            </span>
                            <h3 class="text-xl font-bold text-gray-800 mt-3">${item.name}</h3>
                            <p class="text-xs text-gray-500 mt-1.5 flex items-center gap-1">
                                <i class="fa-solid fa-location-dot text-red-400"></i> ${item.address}
                            </p>
                            <p class="text-xs text-teal-600 mt-1 font-mono font-semibold">EIIN / ID: ${item.id || item.eiin}</p>
                            <p class="text-sm text-gray-600 mt-4 bg-gray-50 p-2.5 rounded-lg border border-gray-100">
                                <strong class="text-gray-700">দায়িত্বপ্রাপ্ত:</strong> ${item.leader}
                            </p>
                        </div>
                        
                        <div class="mt-6 grid grid-cols-2 gap-3">
                            <a href="tel:${item.phone}" class="bg-teal-600 hover:bg-teal-700 text-white text-xs py-2.5 px-3 rounded-xl text-center font-semibold transition flex items-center justify-center gap-1 shadow-sm">
                                <i class="fa-solid fa-phone text-[10px]"></i> যোগাযোগ করুন
                            </a>
                            <button onclick="goToSchoolLogin('${item.id || item.eiin}', '${item.name}')" class="bg-gray-800 hover:bg-gray-900 text-white text-xs py-2.5 px-3 rounded-xl text-center font-semibold transition flex items-center justify-center gap-1 shadow-sm">
                                <i class="fa-solid fa-right-to-bracket text-[10px]"></i> লগইন করুন
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function goToSchoolLogin(schoolId, schoolName) {
            const password = prompt(`"${schoolName}" এর ড্যাশবোর্ডে প্রবেশ করতে পাসওয়ার্ডটি লিখুন:`);
            if (password === null) return; 

            const institutions = JSON.parse(localStorage.getItem('institutions')) || [];
            const currentSchool = institutions.find(item => 
                (item.id && item.id.toString() === schoolId.toString()) || 
                (item.eiin && item.eiin.toString() === schoolId.toString())
            );

            if (currentSchool) {
                const savedPassword = currentSchool.password || currentSchool.pass;
                if (savedPassword && savedPassword.toString() === password.toString()) {
                    localStorage.setItem('currentLoggedInSchoolId', schoolId);
                    alert('লগইন সফল হয়েছে! ড্যাশবোর্ডে প্রবেশ করা হচ্ছে...');
                    window.location.href = "dashboard.html"; 
                } else {
                    alert('ভুল পাসওয়ার্ড! অনুগ্রহ করে সঠিক পাসওয়ার্ড দিন।');
                }
            } else {
                alert('এই প্রতিষ্ঠানের কোনো তথ্য পাওয়া যায়নি!');
            }
        }

        // ধরনগুলোর বাংলা টেক্সট রূপান্তরকারী
        function getTranslatedType(type) {
            const types = { 
                'kindergarten': 'কিন্ডারগার্টেন', 
                'primary': 'প্রাইমারি', 
                'high-school': 'হাই স্কুল', 
                'madrasah': 'মাদরাসা',
                'kg-high-school': 'কিন্ডারগার্টেন অ্যান্ড হাই স্কুল'
            };
            return types[type] || type;
        }
    </script>
</body>
</html>
