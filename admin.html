<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল - কাউন্দিয়া ডিজিটাল বাজার</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <nav class="bg-slate-900 text-white shadow-md px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <span class="text-2xl text-emerald-500"><i class="fa-solid fa-user-shield"></i></span>
            <div>
                <h1 class="text-xl font-black tracking-wide text-gray-100">কাউন্দিয়া পোর্টাল ড্যাশবোর্ড</h1>
                <p class="text-xs text-slate-400">বাজার ডিরেক্টরি ও কন্ট্রোল প্যানেল</p>
            </div>
        </div>
        <div class="flex gap-3">
            <a href="market.html" target="_blank" class="bg-slate-800 hover:bg-slate-700 text-xs md:text-sm text-gray-200 font-bold py-2 px-4 rounded-xl flex items-center gap-2 transition">
                <i class="fa-solid fa-eye"></i> বাজার পেজ দেখুন
            </a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-10 space-y-8">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-xs flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-500">পেন্ডিং আবেদন</p>
                    <h3 id="pending-count" class="text-3xl font-black text-amber-500 mt-1">০</h3>
                </div>
                <span class="text-3xl text-amber-500 bg-amber-50 p-3 rounded-xl"><i class="fa-solid fa-hourglass-half"></i></span>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-xs flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-500">অনুমোদিত দোকান (লাইভ)</p>
                    <h3 id="approved-count" class="text-3xl font-black text-emerald-600 mt-1">০</h3>
                </div>
                <span class="text-3xl text-emerald-500 bg-emerald-50 p-3 rounded-xl"><i class="fa-solid fa-circle-check"></i></span>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="bg-slate-800 text-white p-5 flex items-center justify-between">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <i class="fa-solid fa-clipboard-list text-emerald-400"></i> নতুন দোকানের আবেদনসমূহ
                </h2>
                <button onclick="clearAllData()" class="text-xs bg-red-600 hover:bg-red-700 text-white py-1.5 px-3 rounded-lg transition font-semibold cursor-pointer">
                    <i class="fa-solid fa-trash-can mr-1"></i> সব ডেটা রিসেট করুন
                </button>
            </div>

            <div id="request-container" class="p-6">
                <div id="no-requests" class="text-center py-12 text-gray-400 space-y-3">
                    <span class="text-5xl block"><i class="fa-solid fa-folder-open"></i></span>
                    <p class="text-base font-medium">এই মুহূর্তে কোনো নতুন আবেদন জমা নেই।</p>
                </div>

                <div id="requests-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden">
                    </div>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener("DOMContentLoaded", renderDashboard);

        function renderDashboard() {
            // লোকাল স্টোরেজ থেকে ডেটা লোড করা
            let pendingStores = JSON.parse(localStorage.getItem("pendingStores")) || [];
            let approvedStores = JSON.parse(localStorage.getItem("approvedStores")) || [];

            // কাউন্টার আপডেট
            document.getElementById("pending-count").innerText = pendingStores.length;
            document.getElementById("approved-count").innerText = approvedStores.length;

            let noRequestsDiv = document.getElementById("no-requests");
            let requestsGrid = document.getElementById("requests-grid");
            
            // গ্রিড খালি করা
            requestsGrid.innerHTML = "";

            if (pendingStores.length === 0) {
                noRequestsDiv.classList.remove("hidden");
                requestsGrid.classList.add("hidden");
            } else {
                noRequestsDiv.classList.add("hidden");
                requestsGrid.classList.remove("hidden");

                pendingStores.forEach(store => {
                    // বাংলা ক্যাটাগরি কনভার্টার
                    let categoryName = "";
                    if (store.category === "grocery") categoryName = "মুদি মালামাল";
                    else if (store.category === "vegetable") categoryName = "কাঁচা তরকারি";
                    else if (store.category === "meat") categoryName = "মাছ ও মাংস";

                    let card = `
                        <div class="bg-gray-50 border border-gray-200 rounded-2xl p-5 shadow-xs flex flex-col justify-between space-y-4">
                            <div class="space-y-2">
                                <div class="flex items-center justify-between">
                                    <h3 class="font-bold text-xl text-slate-800">${store.shopName}</h3>
                                    <span class="text-xs bg-amber-100 text-amber-800 font-bold px-2.5 py-0.5 rounded-md">${categoryName}</span>
                                </div>
                                <p class="text-sm text-gray-600"><strong>মালিক:</strong> ${store.ownerName}</p>
                                <p class="text-sm text-gray-600"><strong>মোবাইল:</strong> ${store.phone}</p>
                                <p class="text-sm text-gray-600"><strong>ঠিকানা:</strong> ${store.address}</p>
                                <div class="bg-white p-3 rounded-xl border border-gray-100 text-xs text-gray-600">
                                    <strong class="text-gray-700 block mb-1">📦 পণ্য তালিকা:</strong>
                                    ${store.products}
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3 pt-2">
                                <button onclick="rejectStore(${store.id})" class="bg-white border border-red-200 text-red-600 hover:bg-red-50 font-bold py-2 px-4 rounded-xl text-xs transition cursor-pointer">
                                    <i class="fa-solid fa-xmark mr-1"></i> বাতিল করুন
                                </button>
                                <button onclick="approveStore(${store.id})" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-xl text-xs transition shadow-xs cursor-pointer">
                                    <i class="fa-solid fa-check mr-1"></i> অনুমোদন করুন
                                </button>
                            </div>
                        </div>
                    `;
                    requestsGrid.innerHTML += card;
                });
            }
        }

        // দোকান অনুমোদন (Approve) করার ফাংশন
        function approveStore(id) {
            let pendingStores = JSON.parse(localStorage.getItem("pendingStores")) || [];
            let approvedStores = JSON.parse(localStorage.getItem("approvedStores")) || [];

            // আইডি অনুযায়ী কাঙ্ক্ষিত দোকানটি খুঁজে বের করা
            let storeToApprove = pendingStores.find(store => store.id === id);

            if (storeToApprove) {
                // অনুমোদিত লিস্টে পুশ করা
                approvedStores.push(storeToApprove);
                // পেন্ডিং লিস্ট থেকে রিমুভ করা
                pendingStores = pendingStores.filter(store => store.id !== id);

                // লোকাল স্টোরেজ আপডেট
                localStorage.setItem("pendingStores", JSON.stringify(pendingStores));
                localStorage.setItem("approvedStores", JSON.stringify(approvedStores));

                // ড্যাশবোর্ড রি-রেন্ডার করা
                renderDashboard();
                alert("🎉 দোকানটি সফলভাবে অনুমোদন করা হয়েছে এবং এটি এখন মূল পেজে লাইভ!");
            }
        }

        // দোকান বাতিল (Reject) করার ফাংশন
        function rejectStore(id) {
            if (confirm("আপনি কি নিশ্চিত যে এই আবেদনটি বাতিল করতে চান?")) {
                let pendingStores = JSON.parse(localStorage.getItem("pendingStores")) || [];
                pendingStores = pendingStores.filter(store => store.id !== id);
                localStorage.setItem("pendingStores", JSON.stringify(pendingStores));
                renderDashboard();
            }
        }

        // পুরো ড্যাশবোর্ড ডেটা ক্লিয়ার/রিসেট করার ফাংশন
        function clearAllData() {
            if (confirm("সাবধান! এটি আপনার প্যানেল ও মেইন পেজের সব নতুন যুক্ত করা দোকানের ডেটা মুছে ফেলবে। আপনি কি রিসেট করতে চান?")) {
                localStorage.removeItem("pendingStores");
                localStorage.removeItem("approvedStores");
                renderDashboard();
                alert("সব ডেটা সফলভাবে রিসেট করা হয়েছে।");
            }
        }
    </script>
</body>
</html>
