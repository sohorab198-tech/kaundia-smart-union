<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল - প্রতিষ্ঠান অনুমোদন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="flex flex-col md:flex-row min-h-screen">
        
        <div class="w-full md:w-64 bg-teal-800 text-white flex flex-col shadow-xl">
            <div class="p-5 text-2xl font-bold border-b border-teal-700 flex items-center gap-2">
                <i class="fa-solid fa-user-shield"></i> অ্যাডমিন প্যানেল
            </div>
            <nav class="flex-grow p-4 space-y-2">
                <a href="#" class="block px-4 py-2.5 rounded bg-teal-950 text-white font-medium transition flex items-center gap-3">
                    <i class="fa-solid fa-school"></i> প্রতিষ্ঠানের তালিকা
                </a>
                <a href="#" class="block px-4 py-2.5 rounded hover:bg-teal-700 text-teal-100 hover:text-white transition flex items-center gap-3">
                    <i class="fa-solid fa-chart-line"></i> ড্যাশবোর্ড
                </a>
                <a href="#" class="block px-4 py-2.5 rounded hover:bg-teal-700 text-teal-100 hover:text-white transition flex items-center gap-3">
                    <i class="fa-solid fa-gear"></i> সেটিংস
                </a>
            </nav>
            <div class="p-4 border-t border-teal-700 text-sm text-teal-300 text-center">
                ভার্সন ১.০.০
            </div>
        </div>

        <div class="flex-grow p-6 md:p-10">
            
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between pb-6 border-b border-gray-200 mb-8 gap-4">
                <div>
                    <h1 class="text-3xl font-extrabold text-gray-800">প্রতিষ্ঠানের ঘর (আবেদনসমূহ)</h1>
                    <p class="text-sm text-gray-500 mt-1">নতুন নিবন্ধিত স্কুলের আবেদন রিভিউ এবং অনুমোদন করুন।</p>
                </div>
                <div class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200 flex items-center gap-3">
                    <span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-sm font-medium text-gray-700">সিস্টেম লাইভ আছে</span>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
                <div class="p-5 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
                    <h2 class="font-bold text-gray-700 flex items-center gap-2">
                        <i class="fa-solid fa-list-check text-teal-600"></i> পেন্ডিং ও অনুমোদিত তালিকা
                    </h2>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 border-b border-gray-200 text-gray-600 font-semibold text-sm">
                                <th class="p-3 text-right md:text-left">প্রতিষ্ঠানের নাম ও আইডি</th>
                                <th class="p-3">প্রধান / যোগাযোগ</th>
                                <th class="p-3">অবস্থা (Status)</th>
                                <th class="p-3">অ্যাকশন</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-gray-100">
                            <tr>
                                <td colspan="4" class="p-8 text-center text-gray-400">
                                    <i class="fa-solid fa-spinner animate-spin text-xl mb-2 block"></i> ডাটা লোড হচ্ছে...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // পেজ লোড হওয়া মাত্রই যাতে ডাটা টেবিলে দেখায়
        document.addEventListener("DOMContentLoaded", function() {
            renderAdminInstitutions();
        });

        // অ্যাডমিন প্যানেলে প্রতিষ্ঠানের তালিকা দেখানোর মূল ফাংশন
        function renderAdminInstitutions() {
            const adminTableBody = document.getElementById('admin-table-body'); 
            if (!adminTableBody) return;

            // LocalStorage থেকে ডাটা আনা হচ্ছে
            const institutions = JSON.parse(localStorage.getItem('institutions')) || [];
            adminTableBody.innerHTML = '';

            // যদি কোনো ডাটা না থাকে
            if (institutions.length === 0) {
                adminTableBody.innerHTML = `
                    <tr>
                        <td colspan="4" class="p-8 text-center text-gray-500">
                            <i class="fa-regular fa-folder-open text-3xl mb-2 text-gray-300 block"></i>
                            কোনো প্রতিষ্ঠানের আবেদন পাওয়া যায়নি।
                        </td>
                    </tr>`;
                return;
            }

            // লুপ চালিয়ে প্রতিটি ডাটা টেবিলে বসানো হচ্ছে
            institutions.forEach((item, index) => {
                // স্ট্যাটাস অনুযায়ী সুন্দর ব্যাজ তৈরি
                let statusBadge = item.status === 'pending' 
                    ? `<span class="bg-yellow-100 text-yellow-800 text-xs px-2.5 py-1 rounded-full font-medium shadow-sm border border-yellow-200">পেন্ডিং</span>`
                    : `<span class="bg-green-100 text-green-800 text-xs px-2.5 py-1 rounded-full font-medium shadow-sm border border-green-200">অনুমোদিত</span>`;

                // অ্যাকশন বাতন (পেন্ডিং থাকলে Approve বাটন দেখাবে, অনুমোদিত হলে Approved লেখা দেখাবে)
                let actionButton = item.status === 'pending'
                    ? `<button onclick="approveInstitution('${item.id}')" class="bg-teal-600 hover:bg-teal-700 text-white text-xs px-3 py-1.5 rounded font-medium shadow transition duration-200">Approve</button>`
                    : `<span class="text-green-600 text-xs font-bold flex items-center gap-1"><i class="fa-solid fa-circle-check"></i> Approved</span>`;

                const row = `
                    <tr class="border-b border-gray-100 hover:bg-gray-50/70 text-sm transition">
                        <td class="p-3 font-semibold text-gray-800">
                            ${item.name} <br>
                            <span class="text-xs text-gray-400 font-mono font-normal">ID: ${item.id}</span>
                        </td>
                        <td class="p-3 text-gray-600">
                            <span class="font-medium">${item.leader}</span> <br>
                            <span class="text-xs text-gray-500"><i class="fa-solid fa-phone text-[10px]"></i> ${item.phone || 'N/A'}</span>
                        </td>
                        <td class="p-3">${statusBadge}</td>
                        <td class="p-3 flex gap-4 items-center h-full">
                            ${actionButton}
                            <button onclick="deleteInstitution(${index})" class="text-red-400 hover:text-red-600 transition duration-150" title="মুছে ফেলুন">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>
                `;
                adminTableBody.innerHTML += row;
            });
        }

        // প্রতিষ্ঠান অনুমোদন (Approve) করার ফাংশন
        function approveInstitution(id) {
            let institutions = JSON.parse(localStorage.getItem('institutions')) || [];
            
            // আইডি ম্যাচ করে স্ট্যাটাস 'approved' করা হচ্ছে
            institutions = institutions.map(item => {
                if (item.id === id) {
                    item.status = 'approved'; 
                }
                return item;
            });

            localStorage.setItem('institutions', JSON.stringify(institutions));
            alert('প্রতিষ্ঠানটি সফলভাবে অনুমোদন করা হয়েছে!');
            renderAdminInstitutions(); // টেবিল ইনস্ট্যান্ট আপডেট বা রিফ্রেশ
        }

        // আবেদন ডিলিট করার ফাংশন
        function deleteInstitution(index) {
            if (confirm('আপনি কি এই আবেদনটি তালিকা থেকে চিরতরে মুছে ফেলতে চান?')) {
                let institutions = JSON.parse(localStorage.getItem('institutions')) || [];
                institutions.splice(index, 1); // নির্দিষ্ট ইনডেক্সের ডাটা বাদ দেওয়া
                localStorage.setItem('institutions', JSON.stringify(institutions));
                renderAdminInstitutions(); // টেবিল রিফ্রেশ
            }
        }
    </script>
</body>
</html>
