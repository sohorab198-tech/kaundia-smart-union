<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন দোকান যুক্ত করুন - কাউন্দিয়া ডিজিটাল বাজার</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Hind Siliguri) -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <!-- হেডার -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-6 text-center">
            <a href="market.html" class="inline-flex items-center text-sm bg-blue-700/40 hover:bg-blue-700/60 px-4 py-1.5 rounded-full mb-3 transition">
                <i class="fas fa-arrow-left mr-2"></i> ডিজিটাল বাজারে ফিরে যান
            </a>
            <h1 class="text-2xl md:text-3xl font-bold flex items-center justify-center gap-2">
                <i class="fas fa-store text-yellow-300"></i> নতুন দোকান রেজিস্ট্রেশন
            </h1>
            <p class="text-xs md:text-sm text-blue-100 mt-1">আপনার ব্যবসাকে কাউন্দিয়া ইউনিয়নের সবার কাছে পৌঁছে দিন</p>
        </div>
    </header>

    <!-- মূল ফর্ম -->
    <main class="container mx-auto px-4 py-8 flex-grow max-w-lg">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center text-blue-600 text-2xl mx-auto mb-2">
                    <i class="fas fa-shop"></i>
                </div>
                <h2 class="text-xl font-bold text-slate-800">দোকানের তথ্য প্রদান করুন</h2>
            </div>

            <form id="storeForm" onsubmit="handleStoreSubmit(event)" class="space-y-5">
                
                <!-- দোকানের নাম -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">দোকানের নাম</label>
                    <input type="text" id="storeName" required placeholder="উদাঃ ভাই ভাই স্টোর" 
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 transition text-sm">
                </div>

                <!-- ক্যাটাগরি -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">দোকানের ধরণ</label>
                    <select id="storeCategory" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 transition text-sm">
                        <option>মুদি দোকান</option>
                        <option>কাঁচাবাজার</option>
                        <option>ঔষধের দোকান</option>
                        <option>ইলেকট্রনিক্স</option>
                        <option>অন্যান্য</option>
                    </select>
                </div>

                <!-- ঠিকানা -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">দোকানের অবস্থান</label>
                    <input type="text" id="storeLocation" required placeholder="উদাঃ কাউন্দিয়া মেইন রোড" 
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 transition text-sm">
                </div>

                <!-- ফোন -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">মোবাইল নাম্বার</label>
                    <input type="tel" id="storePhone" required placeholder="01XXXXXXXXX" 
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 transition text-sm">
                </div>

                <!-- সাবমিট -->
                <button type="submit" 
                    class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3 rounded-xl shadow-md transition-all mt-4">
                    <i class="fas fa-paper-plane mr-2"></i> দোকান রেজিস্ট্রেশন করুন
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 text-center py-4 text-xs">
        <p>&copy; 2026 কাউন্দিয়া ইউনিয়ন ডিজিটাল বাজার ডিরেক্টরি।</p>
    </footer>

    <script>
        function handleStoreSubmit(event) {
            event.preventDefault();
            const shopName = document.getElementById('storeName').value;
            alert(`অভিনন্দন! "${shopName}" সফলভাবে আমাদের ডিজিটাল বাজারের তালিকায় যুক্ত হওয়ার আবেদন সম্পন্ন করেছে। অ্যাডমিন যাচাই করে খুব দ্রুত আপনাদের সাথে যোগাযোগ করবে।`);
            document.getElementById('storeForm').reset();
            window.location.href = "market.html";
        }
    </script>
</body>
</html>
